<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<script>
  /* On Safari, shrink the UI overlays to 75% — the canvas stays full-size so it fills the screen. */
  (function(){ var ua=navigator.userAgent||'';
    if(/safari/i.test(ua) && !/chrome|chromium|crios|android|edg|fxios|opr/i.test(ua)){
      document.documentElement.classList.add('sz');
    } })();
</script>
<title>RMIHQ & River Church · Site Map</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,600&family=Archivo:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500&family=Cinzel:wght@600&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1c1f26; --ink-soft:#535b67;
    --glass:rgba(249,247,242,0.86); --line:rgba(28,31,38,0.12);
    --accent:#4b3f8f; --navy:#204e79; --gold:#f0c674;
    --shadow:0 14px 44px rgba(20,18,40,0.18), 0 2px 8px rgba(20,18,40,0.10);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;overflow:hidden;background:#cdd6e2;font-family:'Archivo',sans-serif;color:var(--ink);}
  #app{position:fixed;inset:0;background:radial-gradient(120% 90% at 70% 0%, #eef2f7 0%, #d7dde7 45%, #c4ccda 100%);}
  canvas{display:block;position:absolute;inset:0;touch-action:none;}

  #labels{position:absolute;inset:0;pointer-events:none;overflow:hidden;}
  .lab{position:absolute;transform:translate(-50%,-130%);font-weight:600;font-size:12.5px;letter-spacing:.2px;color:var(--ink);
    background:rgba(255,255,255,.92);padding:4px 9px;border-radius:20px;white-space:nowrap;
    box-shadow:0 4px 14px rgba(20,18,40,.16);border:1px solid rgba(255,255,255,.9);transition:opacity .18s ease;backdrop-filter:blur(4px);}
  .lab::after{content:"";position:absolute;left:50%;bottom:-5px;transform:translateX(-50%) rotate(45deg);
    width:8px;height:8px;background:rgba(255,255,255,.92);border-right:1px solid rgba(255,255,255,.9);border-bottom:1px solid rgba(255,255,255,.9);}
  .lab .dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:6px;vertical-align:1px;}

  #ftPin{position:absolute;z-index:7;pointer-events:auto;cursor:pointer;will-change:left,top;}
  #ftPin .pinInner{animation:bob 2.4s ease-in-out infinite;}
  #ftPin .pinBody{width:26px;height:26px;border-radius:50% 50% 50% 0;background:#e23b2e;transform:rotate(-45deg);
    box-shadow:0 5px 11px rgba(20,18,40,.34);border:1.5px solid #fff;display:flex;align-items:center;justify-content:center;
    transition:transform .15s ease, background .15s ease;}
  #ftPin .pinIcon{transform:rotate(45deg);width:13px;height:13px;display:flex;}
  #ftPin .pinIcon svg{width:13px;height:13px;}
  #ftPin:hover .pinBody, #ftPin.active .pinBody{background:#ef4a3c;transform:rotate(-45deg) scale(1.14);}
  @keyframes bob{0%,100%{transform:translateY(0);}50%{transform:translateY(-3px);}}

  /* amenity (filter) pins */
  #amenLayer{position:absolute;inset:0;pointer-events:none;overflow:hidden;}
  .amen{position:absolute;z-index:6;pointer-events:auto;cursor:pointer;}
  .amen-lbl{position:absolute;bottom:128%;left:50%;transform:translateX(-50%) scale(.88);transform-origin:bottom center;white-space:nowrap;background:#fff;color:#1b2a3a;font:600 11px/1 -apple-system,system-ui,sans-serif;padding:5px 9px;border-radius:8px;box-shadow:0 5px 14px rgba(0,0,0,.25);opacity:0;pointer-events:none;transition:opacity .15s ease, transform .15s ease;}
  .amen-lbl::after{content:"";position:absolute;top:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:#fff;}
  .amen.show{z-index:20;}
  .amen.show .amen-lbl{opacity:1;transform:translateX(-50%) scale(1);}
  .amen .ab{width:22px;height:22px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:1.4px solid #fff;
    box-shadow:0 4px 9px rgba(20,18,40,.3);display:flex;align-items:center;justify-content:center;transition:transform .15s ease;}
  .amen:hover .ab{transform:rotate(-45deg) scale(1.16);}
  .amen .ai{transform:rotate(45deg);width:11px;height:11px;display:flex;}
  .amen .ai svg{width:11px;height:11px;}


  /* filter drawer attached to the info card */
  #fHandle,#dHandle{position:absolute;left:calc(100% - 6px);transform:translateY(-50%);z-index:1;
    width:36px;height:54px;border-radius:0 15px 15px 0;background:var(--glass);backdrop-filter:blur(14px);color:var(--ink);
    border:1px solid var(--line);border-left:none;display:flex;align-items:center;justify-content:center;cursor:pointer;
    box-shadow:9px 6px 18px rgba(20,18,40,.2);transition:background .15s ease;padding-left:6px;}
  #fHandle{top:calc(50% - 31px);}
  #dHandle{top:calc(50% + 31px);}
  #fHandle svg,#dHandle svg{width:19px;height:19px;}
  #fHandle:hover,#dHandle:hover{background:rgba(255,255,255,.95);}
  #infoWrap.fopen #fHandle{background:#fff;}
  #infoWrap.dopen #dHandle{background:#fff;}
  #fdrawer,#ddrawer{position:absolute;top:50%;left:100%;margin-left:42px;width:170px;
    background:var(--navy);border:1px solid rgba(255,255,255,.14);border-radius:14px;padding:9px;
    box-shadow:0 16px 46px rgba(12,28,52,.42);transform:translate(-22px,-50%);opacity:0;pointer-events:none;
    transition:opacity .24s ease, transform .3s cubic-bezier(.2,.8,.2,1);}
  #infoWrap.fopen #fdrawer{opacity:1;transform:translate(0,-50%);pointer-events:auto;}
  #infoWrap.dopen #ddrawer{opacity:1;transform:translate(0,-50%);pointer-events:auto;}
  #fdrawer .fdHead,#ddrawer .fdHead{font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:1.4px;text-transform:uppercase;color:var(--gold);margin:1px 0 7px 6px;}
  .frow{display:flex;align-items:center;gap:8px;width:100%;border:0;background:transparent;cursor:pointer;padding:6px 7px;border-radius:10px;
    text-align:left;font-family:'Archivo',sans-serif;font-size:12px;font-weight:600;color:#eaf1fa;transition:background .15s ease;}
  .frow:hover{background:rgba(255,255,255,.10);}
  .frow .cdot{width:13px;height:13px;border-radius:4px;flex:0 0 auto;box-shadow:inset 0 0 0 1px rgba(255,255,255,.25);}
  .frow .tg{margin-left:auto;width:28px;height:16px;border-radius:9px;background:rgba(255,255,255,.22);position:relative;transition:background .18s ease;flex:0 0 auto;}
  .frow .tg::after{content:"";position:absolute;top:2px;left:2px;width:12px;height:12px;border-radius:50%;background:#fff;transition:left .18s ease;box-shadow:0 1px 2px rgba(0,0,0,.3);}
  .frow.on .tg{background:#33ad5a;}
  .drow .cdot{width:20px;height:20px;border-radius:6px;}
  .dlab{display:flex;flex-direction:column;line-height:1.18;text-align:left;}
  .dlab small{font-size:11.5px;font-style:italic;font-weight:500;opacity:.82;margin-top:1px;}
  .frow.on .tg::after{left:14px;}

  #tools{position:absolute;top:18px;right:18px;z-index:10;display:flex;flex-direction:column;gap:9px;align-items:flex-end;animation:rise .7s .04s cubic-bezier(.2,.8,.2,1) both;}
  .btn{font-size:12.5px;font-weight:600;color:var(--ink);background:var(--glass);backdrop-filter:blur(14px);border:1px solid var(--line);border-radius:11px;
    padding:9px 14px;cursor:pointer;box-shadow:var(--shadow);transition:background .15s,color .15s,transform .12s;display:flex;align-items:center;gap:7px;}
  .btn:hover{transform:translateY(-1px);}
  .btn.on{background:var(--accent);color:#fff;border-color:transparent;}
  .btn svg{width:14px;height:14px;}

  #infoWrap{position:absolute;left:18px;top:18px;z-index:9;}
  .sz #infoWrap, .sz #tools, .sz #compass, .sz #hint{ zoom:0.75; }   /* Safari: shrink UI overlays to 75%; canvas stays full so it fills the screen */
  #info{position:relative;z-index:2;width:350px;max-width:calc(100vw - 36px);
    background:var(--navy);color:#fff;border-radius:16px;padding:9px 14px 9px;box-shadow:0 18px 50px rgba(12,28,52,.42);
    border:1px solid rgba(255,255,255,.14);overflow:visible;animation:rise .7s .16s cubic-bezier(.2,.8,.2,1) both;}
  #info .ititle{font-family:'Fraunces',serif;font-weight:600;font-size:18px;line-height:1.1;letter-spacing:-.2px;}
  #info .idate{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.5px;color:#bfd0e6;margin-top:2px;}
  #info .idiv{height:2px;width:40px;background:var(--gold);border-radius:2px;margin:4px 0;}
  #info .isub{font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:11px;letter-spacing:1.4px;text-transform:uppercase;color:var(--gold);margin-bottom:4px;}
  #info ul{list-style:none;margin:0;padding:0;}
  #info li{position:relative;padding:1px 0 1px 18px;font-size:13.5px;line-height:1.25;color:#eaf1fa;}
  #info li::before{content:"";position:absolute;left:1px;top:10px;width:6px;height:6px;border-radius:50%;background:var(--gold);}
  #info ul.twocol{column-count:2;column-gap:14px;}
  #info ul.twocol li{break-inside:avoid;-webkit-column-break-inside:avoid;}
  #info ul.twocol li.colbreak{break-after:column;-webkit-column-break-after:column;}
  #info .ok{color:#8fe6a4;font-weight:700;letter-spacing:.3px;}
  #info .no{color:#f4a0a1;font-weight:700;letter-spacing:.3px;}
  #info .cbtn{display:inline-block;margin-top:4px;padding:2.5px 10px;border-radius:999px;
    font-weight:700;font-size:10px;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;
    border:1px solid transparent;box-shadow:0 1px 2px rgba(8,18,40,.10);
    transition:transform .14s cubic-bezier(.2,.8,.2,1), box-shadow .14s ease, filter .14s ease;
    -webkit-tap-highlight-color:transparent;}
  #info .cbtn:hover{transform:translateY(-1px);filter:saturate(1.1);box-shadow:0 3px 9px rgba(8,18,40,.20);}
  #info .cbtn:active{transform:translateY(0);box-shadow:0 1px 2px rgba(8,18,40,.12);}
  #info .ibody{animation:cardfade .34s ease both;}
  #info li .sub{display:block;padding-left:14px;font-size:12.5px;color:#ccd9ea;margin-top:2px;line-height:1.25;letter-spacing:.2px;}

  #compass{position:absolute;left:20px;bottom:20px;z-index:10;width:46px;height:46px;border-radius:50%;background:var(--glass);backdrop-filter:blur(14px);
    border:1px solid var(--line);box-shadow:var(--shadow);display:flex;align-items:center;justify-content:center;animation:rise .7s .12s cubic-bezier(.2,.8,.2,1) both;}
  #needle{position:relative;width:8px;height:30px;}
  #needle .n{position:absolute;left:50%;top:0;transform:translateX(-50%);border-left:7px solid transparent;border-right:7px solid transparent;border-bottom:20px solid var(--navy);}
  #needle .s{position:absolute;left:50%;bottom:0;transform:translateX(-50%);border-left:4px solid transparent;border-right:4px solid transparent;border-top:12px solid #b9bcc4;}
  #compass .nlbl{position:absolute;left:50%;top:5px;transform:translateX(-50%);font-family:'IBM Plex Mono',monospace;font-size:8px;font-weight:700;color:#fff;pointer-events:none;}

  #hint{position:absolute;bottom:22px;left:50%;transform:translateX(-50%);font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.5px;color:var(--ink-soft);
    background:var(--glass);backdrop-filter:blur(10px);border:1px solid var(--line);padding:7px 15px;border-radius:30px;box-shadow:var(--shadow);transition:opacity .6s ease;white-space:nowrap;}

  #loader{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#d7dde7;z-index:20;
    font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:2px;color:var(--accent);}
  #loader .ring{width:30px;height:30px;border:3px solid rgba(75,63,143,.2);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;margin-right:14px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  @keyframes rise{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:none;}}
  @keyframes cardfade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}

  @media (max-width:680px){
    #hint{display:none;}
    .btn span.t{display:none;} .btn{padding:9px;}
    #info{width:350px;max-width:calc(100vw - 24px);padding:8px 11px 8px;border-radius:14px;}
    #info .ititle{font-size:14px;}
    #info .idate{font-size:9px;margin-top:3px;letter-spacing:.3px;}
    #info .idiv{margin:6px 0;width:32px;}
    #info .isub{font-size:9px;margin-bottom:5px;letter-spacing:1px;}
    #info li{font-size:11px;padding:2px 0 2px 14px;line-height:1.2;}
    #info li::before{top:8px;width:5px;height:5px;}
    #infoWrap{left:12px;top:12px;right:auto;bottom:auto;}
    #info ul.twocol{column-count:2;column-gap:10px;}
    #info ul.twocol li.colbreak{break-after:column;-webkit-column-break-after:column;}
    #compass{width:40px;height:40px;left:12px;bottom:12px;}
    #fHandle{top:calc(100% - 6px);bottom:auto;right:auto;left:calc(50% - 70px);transform:none;width:66px;height:30px;border-radius:0 0 15px 15px;border:1px solid var(--line);border-top:none;padding:5px 0 0 0;}
    #dHandle{top:calc(100% - 6px);bottom:auto;right:auto;left:calc(50% + 4px);transform:none;width:66px;height:30px;border-radius:0 0 15px 15px;border:1px solid var(--line);border-top:none;padding:5px 0 0 0;}
    #fdrawer,#ddrawer{top:100%;bottom:auto;left:auto;right:0;margin:40px 0 0 0;width:100%;transform:translateY(-22px);}
    #infoWrap.fopen #fdrawer{transform:translateY(0);}
    #infoWrap.dopen #ddrawer{transform:translateY(0);}
  }
</style>
</head>
<body>
<div id="app">
  <div id="labels"></div>
  <div id="amenLayer"></div>

  <div id="tools">
    <button class="btn" id="resetBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4v4h4"/></svg><span class="t">View</span></button>
    <button class="btn" id="nightBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"/></svg><span class="t">Night</span></button>
  </div>

  <div id="infoWrap">
    <button id="fHandle" aria-label="Filters">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="8" x2="20" y2="8"/><circle cx="9" cy="8" r="2.2" fill="currentColor"/><line x1="4" y1="16" x2="20" y2="16"/><circle cx="15" cy="16" r="2.2" fill="currentColor"/></svg>
    </button>
    <button id="dHandle" aria-label="Directions">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M5 20 V8 H16"/><path d="M12 4 L16.5 8 L12 12"/></svg>
    </button>
    <div id="info">
      <div id="fdrawer">
        <div class="fdHead">Show on Map</div>
        <div id="chips"></div>
      </div>
      <div id="ddrawer">
        <div class="fdHead">Directions</div>
        <div id="dirchips"></div>
      </div>
      <div class="ititle">FIRE CONFERENCE 2026 MAP</div>
      <div class="idate" id="idate"></div>
      <div class="idiv"></div>
      <div class="ibody" id="ibody">
        <div class="isub" id="isub"></div>
        <ul id="ilist"></ul>
      </div>
    </div>
  </div>

  <div id="ftPin"><div class="pinInner"><div class="pinBody"><div class="pinIcon"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3v4M8 3v4M10 3v4M6 7h4M8 7v14"/><ellipse cx="16.5" cy="6.4" rx="2.6" ry="3.6"/><path d="M16.5 10v11"/></svg></div></div></div></div>
  <div id="compass"><div id="needle"><div class="n"></div></div></div>
  <div id="hint">DRAG TO TILT &amp; TURN · PINCH OR DOUBLE-TAP TO ZOOM · TAP A BUILDING FOR DETAILS</div>
  <div id="loader"><div class="ring"></div>BUILDING SITE</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
  "use strict";

  /* ============================================================
     LIVE STATUS  (this is the part wired to your church database)
     STATUS holds the OPEN/CLOSED state for each space. Today it has
     defaults; set STATUS_URL to a JSON feed and it will refresh live.
     ============================================================ */
  var STATUS = { "River Kids":"OPEN", "River Bears":"CLOSED", "River Nursery":"OPEN", "Parents' Room":"OPEN" };
  var STATUS_URL = "";          // e.g. "https://your-feed.example.com/status.json"
  var STATUS_POLL_MS = 60000;   // how often to refresh (60s)

  function applyStatuses(obj){
    if(!obj) return;
    Object.keys(obj).forEach(function(k){ STATUS[k] = String(obj[k]).toUpperCase(); });
    renderCard(selectedId); // refresh whatever card is showing
  }
  function pollStatuses(){
    if(!STATUS_URL) return;
    fetch(STATUS_URL,{cache:"no-store"}).then(function(r){return r.json();}).then(applyStatuses).catch(function(){});
  }

  function statusLine(name){ return name + ": " + (STATUS[name] || "—"); }

  /* ============================================================
     CONTENT  (edit these lists freely)
     ============================================================ */
  function defaultItems(){
    return ["Fire Conference:<br><span class='cbtn' data-route='main' style='color:#c62828;background:#fdecea;border-color:#f6c9c4'>Main Auditorium</span>",
            "River Nursery:<br><span class='cbtn' data-route='nursery' style='color:#c62828;background:#fdecea;border-color:#f6c9c4'>Ages 1 - 2</span>",
            "Parents' Room:<br><span class='cbtn' data-route='parents' style='color:#1c8048;background:#e8f6ee;border-color:#bfe6cd'>OPEN</span>",
            "River Bears:<br><span class='cbtn' data-route='bears' style='color:#936f00;background:#faf0d2;border-color:#ecd89a'>Ages 3 - 5</span>",
            "Kids Week:<br><span class='cbtn' data-route='kids' style='color:#2563ad;background:#e9f1fb;border-color:#c4dbf3'>Ages 6 - 12</span>",
            "Youth Week:<br><span class='cbtn' data-route='youth' style='color:#cf5f12;background:#fbecdb;border-color:#f3cfa6'>Ages 13 - 19</span>"];
  }
  var STRUCTURES = [
    { id:'pavilion',   name:'RIVER PAVILION',  color:'#efe9da', labelPos:[-53,29,-12], twocol:true,
      info:["RMI Bookstore","Operation Eden Market","Studio B Experience","River Manor Farms","A Land of Delight","Kings Arms Coffee","Kingdom Business Booths"] },
    { id:'auditorium', name:'FIRE CONFERENCE', color:'#9aa0a8', labelPos:[16,21,-21],
      build:function(){ return ["The Main Event: Sundays 9:30 AM",
                                "Executive Offices Hours<span class='sub'>MON: 10AM - 5PM</span><span class='sub'>TUE - FRI: 9AM - 5PM</span>",
                                statusLine("River Nursery"), statusLine("Parents' Room")]; } },
    { id:'studiob',    name:'RIVER BEARS',     color:'#243463', labelPos:[-11,16,-110],
      build:function(){ return ["Studio B Auditorium","Media & Production","Broadcast Center", statusLine("River Bears"), statusLine("River Kids")]; } },
    { id:'foodtrucks', name:'Vendors',     color:'#33ad5a', labelPos:[-53,16,60],
      info:["Kickin' Caribbean — Jerk-style, bowls","Me Gusta — American, platters","Potzee's — Italian, sandwiches",
            "Smoothie King — smoothies, drinks","Trevone's — Southern, platters"] },
    { id:'welcome',    name:'Welcome Center',  color:'#efe4d2', labelPos:[-45,11.5,76],
      info:["First-Time Guests","Directions & Info","Greeter Team"] }
  ];
  var byId={}; STRUCTURES.forEach(function(s){ byId[s.id]=s; });
  var ACCENT=0x4b3f8f;

  /* ---------- renderer / scene / camera ---------- */
  var appEl=document.getElementById('app');
  var renderer=new THREE.WebGLRenderer({antialias:true});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled=true; renderer.shadowMap.type=THREE.PCFSoftShadowMap;
  renderer.outputEncoding=THREE.sRGBEncoding; renderer.toneMapping=THREE.ACESFilmicToneMapping; renderer.toneMappingExposure=1.06;
  appEl.appendChild(renderer.domElement);

  function makeSky(){
    var c=document.createElement('canvas'); c.width=1024; c.height=1024; var x=c.getContext('2d');
    var g=x.createLinearGradient(0,0,0,1024); g.addColorStop(0,'#3f86d4'); g.addColorStop(0.55,'#8abdec'); g.addColorStop(1,'#d8edf9');
    x.fillStyle=g; x.fillRect(0,0,1024,1024);
    var t=new THREE.CanvasTexture(c); t.encoding=THREE.sRGBEncoding; return t;
  }
  var daySky=makeSky();
  var scene=new THREE.Scene(); scene.background=daySky; scene.fog=new THREE.Fog('#cfe6f5',340,680);
  var camera=new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 1, 2000);

  var hemi=new THREE.HemisphereLight('#ffffff','#aab0bb',0.64); scene.add(hemi);
  var sun=new THREE.DirectionalLight('#fff7ec',1.04); sun.position.set(70,160,60); sun.castShadow=true; sun.shadow.mapSize.set(2048,2048);
  sun.shadow.camera.near=20; sun.shadow.camera.far=520; sun.shadow.camera.left=-200; sun.shadow.camera.right=200; sun.shadow.camera.top=200; sun.shadow.camera.bottom=-200; sun.shadow.bias=-0.0004;

        push(x + rr*Math.cos(ang), f*h, z + rr*Math.sin(ang)); }
    }
    function strand(way, y, spacing){            // run a string along a polyline of [x,z] points
      for(var w=0;w<way.length-1;w++){ var a=way[w], b=way[w+1],
          seg=Math.hypot(b[0]-a[0], b[1]-a[1]), steps=Math.max(2, Math.round(seg/spacing));
        for(var t=0;t<steps;t++){ var u=t/steps; push(a[0]+(b[0]-a[0])*u, y, a[1]+(b[1]-a[1])*u); } }
      push(way[way.length-1][0], y, way[way.length-1][1]);
    }
    function strand3(pts, spacing){             // run a string along a 3D polyline of [x,y,z] points
      for(var w=0;w<pts.length-1;w++){ var a=pts[w], b=pts[w+1],
          seg=Math.hypot(b[0]-a[0], b[1]-a[1], b[2]-a[2]), steps=Math.max(2, Math.round(seg/spacing));
        for(var t=0;t<steps;t++){ var u=t/steps; push(a[0]+(b[0]-a[0])*u, a[1]+(b[1]-a[1])*u, a[2]+(b[2]-a[2])*u); } }
      push(pts[pts.length-1][0], pts[pts.length-1][1], pts[pts.length-1][2]);
    }

    // (a) Pavilion arches — hug the inside of the barrel roof (R=21, base y=6, centered x=-53);
    //     denser bulbs, arches stepping north every 3.2 units from the south rim (z=44) to the north end (z=-68).
    var R=20.4, AN=36;
    for(var az=44; az>=-68; az-=3.2){
      for(var i=0;i<AN;i++){ var th=-Math.PI/2 + (i/(AN-1))*Math.PI;
        push(-53 + R*Math.sin(th), 6 + R*Math.cos(th), az); }
    }

    // (b) Helix-wrapped palms — tighter spiral (more turns), more bulbs.
    for(var p=0;p<xmasPalms.length;p++){ var pm=xmasPalms[p];
      helix(pm.x, pm.z, pm.h, 0.26, 0.11, 12, 0.10, 4.6); }

    // (c) Five trees north of the main sanctuary — wrap each trunk base to canopy.
    [[-22,-56.5,6,0.9,0.6],[-9,-71,5,0.75,0.5],[1.2,-90.5,6,0.9,0.6],[1.2,-70.5,5,0.75,0.5],[-9.5,-90.5,5,0.75,0.5]]
      .forEach(function(t){ helix(t[0], t[1], t[2], t[3], t[4], 9, 0.12, 4.2); });

    // (d) Main Sanctuary — along the highest roof edge (top of the upper band, y=15), down the west side,
    //     stopping where each edge meets the N-S cross segment (x=8).
    strand([[8,-3],[-12,-3],[-12,-39],[8,-39]], 14.9, 1.15);

    // (e) Studio B — top of the SOUTH face only (z=-98 face, y=10), full width.
    strand([[-56,-97.8],[34,-97.8]], 10.05, 2.0);

    // (f) Blue west awning — along its outer rim (south end, west edge, north end), at the awning's lower edge.
    strand([[-12,0.95],[-16,0.95],[-16,-42.95],[-12,-42.95]], 4.7, 1.4);

    // (g) Stair awnings that go upstairs — run lights UP each one's OUTER edge (just beyond the awning slab
    //     at z = scz + side*2.7), along the awning's LOWER edge, following the climbing profile (x,y).
    var awnProf=[[-12,5.0],[-8.88,7.6],[-6.68,7.6],[-3.56,10.2],[-1.36,10.2],[1.76,12.8],[8.24,12.8]];
    [ {scz:-1.66, side:1}, {scz:-40.34, side:-1} ].forEach(function(o){ var oz=o.scz + o.side*2.7;
      strand3(awnProf.map(function(q){ return [q[0], q[1]-0.35, oz]; }), 1.2); });

    // (h) Welcome Center tent — string around the outside eave edge (centered x=-45, z=76; half-spans 12 x 9; eave y=5).
    strand([[-57,67],[-33,67],[-33,85],[-57,85],[-57,67]], 5.15, 1.4);

    // soft round warm bulb sprite (warm white, leaning toward yellow)
    var c=document.createElement('canvas'); c.width=c.height=64; var g=c.getContext('2d');
    var gr=g.createRadialGradient(32,32,0,32,32,32);
    gr.addColorStop(0,'rgba(255,248,222,1)'); gr.addColorStop(0.28,'rgba(255,234,170,1)');
    gr.addColorStop(0.58,'rgba(255,220,142,0.5)'); gr.addColorStop(1,'rgba(255,214,132,0)');
    g.fillStyle=gr; g.fillRect(0,0,64,64);
    var tex=new THREE.CanvasTexture(c);

    var geo=new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(P),3));
    var lmat=new THREE.PointsMaterial({ size:0.92, map:tex, transparent:true, depthWrite:false,
      blending:THREE.AdditiveBlending, sizeAttenuation:true, color:new THREE.Color('#ffe6a2') });
    xmasLights=new THREE.Points(geo, lmat);
    xmasLights.visible=false;                    // night-only
    scene.add(xmasLights);
  })();

  /* ---- night-mode "soft wash" lamps : real lights that bathe surfaces + ground, on only at night ---- */
  var nightLamps=[];
  (function(){
    function lamp(light, onI){ light.intensity=0; light.userData.onI=onI; nightLamps.push(light); scene.add(light); return light; }
    function warmPoint(x,y,z, color, onI, dist){ var l=new THREE.PointLight(new THREE.Color(color), 0, dist||60, 1); l.position.set(x,y,z); return lamp(l,onI); }

    // floodlights between the outer pilaster pairs, washing down over the awning + west seating
    [-32.5, -9.5].forEach(function(fz){
      var sp=new THREE.SpotLight(new THREE.Color('#ffe1a6'), 0, 42, 0.72, 0.55, 1);
      sp.position.set(-12.6, 14.0, fz); sp.target.position.set(-18.5, 0, fz);
      scene.add(sp.target); lamp(sp, 2.2);
    });

    // Studio B pill sign — soft warm glow + gentle wash on the wall
    warmPoint(14.75, 7.3, -95.8, '#ffe3ac', 2.0, 32);

    // soft festive wash for the big clusters (pavilion, palms, north trees)
    warmPoint(-53, 13, 12,  '#ffe6b2', 2.8, 72);   // pavilion interior, south
    warmPoint(-53, 13, -42, '#ffe6b2', 2.5, 72);   // pavilion interior, north
    warmPoint(-53, 7,  46,  '#ffe1a4', 4.2, 58);   // food-truck palms
    warmPoint(-8, 7,  -65, '#ffe1a4', 3.0, 58);    // wash near the white tent / SE pavement, nudged NW

    // diffused washes over the south + north apron turfs (mounted high, low intensity = soft spread)
    warmPoint(-0.9,  9.5, 7.35,  '#ffe6b0', 2.2, 34);   // south apron turf
    warmPoint(-11.65,9.5, -43.1, '#ffe6b0', 2.2, 44);   // north apron turf

    // gravel yard + KIDS WEEK tent washes
    warmPoint(6,   9,   17,   '#ffe6b0', 2.4, 48);   // north gravel area
    warmPoint(6,   9,   43,   '#ffe6b0', 2.4, 48);   // south gravel area
    warmPoint(28,  8.5, 30,   '#ffe6b0', 2.2, 44);   // east gravel
    warmPoint(-19, 7.5, 29.6, '#ffe1a4', 2.8, 36);   // KIDS WEEK tent west entrance
  })();

  /* ---- night mode ---- */
  var nightSky=new THREE.Color('#0c1322');
  var NIGHT={ bg:nightSky, fogC:'#0c1322', hemiSky:'#36436c', hemiGnd:'#0a0f1c', hemiI:0.52, sunC:'#aebde8', sunI:0.55, ambC:'#1a2440', ambI:0.34 };
  var DAY  ={ bg:daySky,   fogC:'#cfe6f5', hemiSky:'#ffffff', hemiGnd:'#aab0bb', hemiI:0.64, sunC:'#fff7ec', sunI:1.04, ambC:'#ffffff', ambI:0.18 };
  var isNight=false;
  function applyTheme(t){
    scene.background=t.bg; scene.fog.color.set(t.fogC);
    hemi.color.set(t.hemiSky); hemi.groundColor.set(t.hemiGnd); hemi.intensity=t.hemiI;
    sun.color.set(t.sunC); sun.intensity=t.sunI;
    amb.color.set(t.ambC); amb.intensity=t.ambI;
  }
  var nightBtn=document.getElementById('nightBtn');
  var SUN_SVG='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4.1"/><path d="M12 1.6v2.4M12 20v2.4M3.5 3.5l1.7 1.7M18.8 18.8l1.7 1.7M1.6 12h2.4M20 12h2.4M3.5 20.5l1.7-1.7M18.8 5.2l1.7-1.7"/></svg>';
  var MOON_SVG='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"/></svg>';
  function updateNightBtn(){ nightBtn.innerHTML=(isNight?MOON_SVG:SUN_SVG)+'<span class="t">'+(isNight?'Night':'Day')+'</span>'; nightBtn.classList.toggle('on',isNight); }
  function setNight(night){ isNight=night;
    if(xmasLights) xmasLights.visible=isNight;
    for(var i=0;i<nightLamps.length;i++){ nightLamps[i].intensity = isNight ? nightLamps[i].userData.onI : 0; }
    for(var j=0;j<labelGlows.length;j++){ labelGlows[j].visible=isNight; }
    updateNightBtn(); applyTheme(isNight?NIGHT:DAY);
  }
  nightBtn.addEventListener('click', function(){ setNight(!isNight); });

  // automatic: night runs 8PM -> 7AM, re-checked each minute so it flips on its own at the boundary
  function nightByClock(){ var hr=new Date().getHours(); return hr>=20 || hr<7; }
  var lastAuto=nightByClock(); setNight(lastAuto);
  setInterval(function(){ var t=nightByClock(); if(t!==lastAuto){ lastAuto=t; setNight(t); } }, 60000);
  window.addEventListener('resize', function(){ camera.aspect=window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); if(sph.radius>R_MAX){ sph.radius=R_MAX; applyCamera(); } });

  /* ===================== loop ===================== */
  var clock=new THREE.Clock();
  function tick(){ requestAnimationFrame(tick); var dt=Math.min(clock.getDelta(),0.05);
    if(anim){ anim.t+=dt/anim.dur; var k=anim.t>=1?1:easeIO(anim.t);
      target.lerpVectors(anim.ft,anim.tt,k); sph.radius=anim.fr+(anim.tr-anim.fr)*k; sph.theta=anim.fth+(anim.tth-anim.fth)*k; sph.phi=anim.fph+(anim.tph-anim.fph)*k;
      applyCamera(); if(anim.t>=1){ anim=null; if(swayAfterFly){ swayAfterFly=false; swayT=0; autoSway=true; } }
    } else if(autoSway && !dragging){ swayT+=dt; sph.theta=clampTheta(Math.sin(swayT*0.28)*0.22); applyCamera(); }
    renderer.render(scene,camera); updateLabels(); updatePinPos(); updateAmen(); updateCompass(); }

  setTimeout(function(){ var l=document.getElementById('loader'); l.style.transition='opacity .5s ease'; l.style.opacity='0'; setTimeout(function(){ l.remove(); },520); }, 350);
  el.style.cursor='grab'; tick();
  var hint=document.getElementById('hint'); setTimeout(function(){ if(hint) hint.style.opacity='0'; }, 9000);

  /* live status polling (no-op until STATUS_URL is set) */
  pollStatuses(); if(STATUS_URL) setInterval(pollStatuses, STATUS_POLL_MS);
})();
</script>
