  window.COR_ISSUE={

    sections:[
      {id:'welcome', toc:'Welcome', page:2, kicker:'WELCOME · PAGE 2',
       title:'Welcome to the 3‑in‑1 Family Fire Conference',
       byline:'By Drs. Rodney & Adonica Howard‑Browne',
       blocks:[
        {t:'photoR', src:'p02-1.jpg', alt:'Drs. Rodney and Adonica Howard-Browne', cap:'DRS. RODNEY & ADONICA HOWARD‑BROWNE'},
        {t:'drop', text:'We’re thrilled to welcome you to our annual 3‑in‑1 Family Fire Conference! This is one of our favorite weeks of the year, as families from around the world gather to encounter God together.'},
        {t:'p', text:'From the very beginning, God designed the family to be a place where His presence dwells and where faith is passed from one generation to the next. This week is about raising up strong families, passionate young people, and children who know God and are unashamed of the Gospel.'},
        {t:'p', text:'Take every opportunity to be in every service. Come expecting His Word to strengthen you, His presence to refresh you, and His power to transform your life. God always meets those who are hungry — and this week, you will be marked for eternity.'},
        {t:'sig', lines:['For the Harvest,','Drs. Rodney & Adonica Howard‑Browne']},
        {t:'box', rows:[['PUBLISHER','Revival Ministries International'],['EDITOR-IN-CHIEF','Dr. Rodney Howard‑Browne'],['MANAGING EDITOR','Dr. Adonica Howard‑Browne'],['EDITORIAL ASSTS.','Somalia Alsobrooks · Darrain & Christine Matthews']]},
        {t:'h2', text:'About: Drs. Rodney & Adonica Howard‑Browne', sub:'UPDATED JULY 2026'},
        {t:'p', text:'Drs. Rodney and Adonica Howard‑Browne are the founders of Revival Ministries International (R.M.I.), The River at Tampa Bay Church, and River University – River Bible Institute (R.U.) in Tampa, Florida.'},
        {t:'p', text:'In December of 1987, Rodney, along with his wife, Adonica, and their three children, Kirsten, Kelly, and Kenneth, moved from their native land, South Africa, to the United States, called by God as missionaries from Africa to America. In a word of prophecy spoken through Rodney, the Lord said, “As America has sown missionaries over the last 200 years, I am going to raise up people from other nations to come to the United States of America. I am sending a mighty revival to America.”'},
        {t:'p', text:'In April of 1989, the Lord sent a revival of signs, wonders, and miracles that began in a church in Clifton Park, New York. That revival has continued, resulting in thousands of people being touched and changed as they encounter the presence of the living God. God is still moving today—saving, healing, delivering, restoring, and setting people free!'},
        {t:'p', text:'Drs. Rodney and Adonica’s second daughter, Kelly, was born with an incurable lung disease called cystic fibrosis. Early on Christmas morning in 2002, at the age of 18, she ran out of lung capacity and breathed out her last breath. They placed her into the arms of her Lord and Savior, and vowed that the devil would pay for what he had done to their family — and to do everything in their power, with the help of the Lord, to win 100 million souls to Jesus and to put $1 billion into world missions and the harvest of souls.'},
        {t:'p', text:'Believing for a Great Spiritual Awakening, they conducted Celebrate America D.C., a massive soul‑winning event, preaching the Gospel for 50 nights in Washington, D.C. and surrounding areas from 2014 to 2019 — 58,033 individuals made decisions for Jesus Christ. During the Covid era they took a stand for the Gospel and our God‑given liberties; The Stand nightly services have continued for over 2,220 nights.'},
        {t:'p', text:'With a passion for souls, they have conducted revivals and soul‑winning efforts throughout 101 nations with the 500 City World Tour, Good News campaigns, R.M.I. Revivals, the Great Awakening Tours and television, and The Stand. As a result, over 58,835,324 precious people have received salvation or recommitted their lives to Christ at the time of this publication. For more information, visit revival.com.'}
       ]},
      {id:'books', toc:'Book Release', page:3, kicker:'BOOK RELEASE · PAGE 3',
       title:'New Books Are Out and Ready for You!',
       blocks:[
        {t:'dek', text:'Stop by the bookstore and grab them all before they’re gone — fresh titles for Summer campmeeting are here now.'},
        {t:'strip', tall:true, imgs:[['p03-8.jpg','12 Qualifications and Responsibilities of Leadership'],['p03-9.jpg','This Is Your Jubilee'],['p03-0.jpg','The Source of Your Joy'],['p03-1.jpg','The Holy Spirit in the Life of Holiness'],['p03-10.jpg','Run to the Roar'],['p03-4.jpg','Diligence in Business'],['p03-5.jpg','Righteous']]},
        {t:'cap', text:'NEW TITLES AT THE CAMPMEETING BOOKSTORE · PG. 3'},
        {t:'h2', text:'12 Qualifications and Responsibilities of Leadership'},
        {t:'dek', text:'By Dr. Rodney Howard‑Browne'},
        {t:'p', text:'Leadership today is often measured by power, popularity, and influence. However, Heaven measures it by something far greater: character, integrity, and the fear of the Lord. This book is a clear, uncompromising call back to God’s standard — every leader, whether in the home, the Church, the marketplace, or government, is under authority and will give an account to Almighty God.'},
        {t:'p', text:'You will discover the biblical qualifications that define true leadership: obedience to God’s Word, a pure heart, wisdom, honesty, and courage in the face of pressure. It also exposes the subtle compromises that weaken leadership and equips you to lead with righteousness and boldness in a world that rewards the opposite.'},
        {t:'h2', text:'This Is Your Jubilee'},
        {t:'dek', text:'By Dr. Rodney Howard‑Browne'},
        {t:'p', text:'The acceptable year of the Lord is not a date on a calendar — it is a present reality in Christ. When Jesus declared, “This day is this scripture fulfilled,” He announced the arrival of permanent Jubilee: freedom for the captive, restoration for the broken, and the overflowing favor of God for every believer.'},
        {t:'p', text:'This book confronts every religious mindset that keeps people bound to lack, fear, and striving. You will be challenged to step out of a survival mindset and into a life of faith and supernatural supply. You were not redeemed to struggle — you were redeemed to live in God’s blessing and prosperity. Your Jubilee is now.'},
        {t:'link', text:'PURCHASE ONLINE · REVIVAL.COM · OR VISIT THE BOOKSTORE', href:'https://revival.com'}
       ]},

      {id:'banquet', toc:'R.U. Banquet for the History Books', page:13, kicker:'RECAP · PAGE 13', title:'R.U. Banquet for the History Books', blocks:[{t:'p', text:'(Full section arrives in the next build of this issue.)'}]},
      {id:'witness', toc:'The Power to Be a Witness', page:14, kicker:'FEATURE · PAGES 14–17', title:'The Power to Be a Witness', blocks:[{t:'p', text:'(Full section arrives in the next build of this issue.)'}]},
      {id:'mobilized', toc:'A Ministry Mobilized', page:18, kicker:'MINISTRIES · PAGES 18–19', title:'A Ministry Mobilized', blocks:[{t:'p', text:'(Full section arrives in the next build of this issue.)'}]},
      {id:'ru', toc:'River University', page:20, kicker:'RIVER UNIVERSITY · PAGE 20', title:'River University', blocks:[{t:'p', text:'(Full section arrives in the next build of this issue.)'}]},
      {id:'vow', toc:'Vow of Prosperity', page:21, kicker:'DEVOTIONAL · PAGE 21', title:'Vow of Prosperity', blocks:[{t:'p', text:'(Full section arrives in the next build of this issue.)'}]},
      {id:'events', toc:'Upcoming Events', page:22, kicker:'EVENTS · PAGE 22', title:'Upcoming Events', blocks:[{t:'p', text:'(Full section arrives in the next build of this issue.)'}]},
      {id:'map', toc:'Property Map', page:23, kicker:'CAMPUS · PAGE 23', title:'Property Map', blocks:[{t:'p', text:'(Full section arrives in the next build of this issue.)'}]},
      {id:'watch', toc:'Ways to Watch', page:24, kicker:'BROADCAST · PAGE 24', title:'Ways to Watch', blocks:[{t:'p', text:'(Full section arrives in the next build of this issue.)'}]}
    ]};
</script>
<script>
(function(){
  "use strict";
  function el(id){ return document.getElementById(id); }
  function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function trackEvent(name,params){ if(window.gtag) gtag('event',name,params||{}); }
    /* ============ Chronicles of Revival reader ============ */
    var newsBuilt=false, newsSec=0, newsSecEls=[], newsRaf=0, newsPoll=0, newsLastTop=-1;
    function nwsTheme(){ try{ return localStorage.getItem('fc_news_theme')==='ink'?'ink':'paper'; }catch(e){ return 'paper'; } }
    function nwsBlock(b){
      var h='';
      if(b.t==='p') h='<p class="nwsP">'+esc(b.text)+'</p>';
      else if(b.t==='drop') h='<p class="nwsP"><span class="nwsDC">'+esc(b.text.charAt(0))+'</span>'+esc(b.text.slice(1))+'</p>';
      else if(b.t==='dek') h='<div class="nwsDek">'+esc(b.text)+'</div>';
      else if(b.t==='sig') h='<div class="nwsSig">'+b.lines.map(esc).join('<br>')+'</div>';
      else if(b.t==='h2') h='<div class="nwsH2">'+esc(b.text)+'</div>'+(b.sub?'<div class="nwsSub">'+esc(b.sub)+'</div>':'');
      else if(b.t==='h3') h='<div class="nwsH3">'+esc(b.text)+'</div>';
      else if(b.t==='photo') h='<img class="nwsImg" loading="lazy" src="/cor/'+b.src+'" alt="'+esc(b.alt||'')+'">'+(b.cap?'<div class="nwsCap">'+esc(b.cap)+'</div>':'');
      else if(b.t==='photoR') h='<div class="nwsPhR"><img loading="lazy" src="/cor/'+b.src+'" alt="'+esc(b.alt||'')+'"><div class="nwsCap">'+esc(b.cap||'')+'</div></div>';
      else if(b.t==='strip') h='<div class="nwsStrip'+(b.tall?' tall':'')+'">'+b.imgs.map(function(im){ return '<img loading="lazy" src="/cor/'+im[0]+'" alt="'+esc(im[1]||'')+'">'; }).join('')+'</div>';
      else if(b.t==='cap') h='<div class="nwsCap">'+esc(b.text)+'</div>';
      else if(b.t==='quote') h='<div class="nwsQ"><div class="q">'+esc(b.text)+'</div><div class="a">'+esc(b.attr||'')+'</div></div>';
      else if(b.t==='stats') h='<div class="nwsStats">'+b.cells.map(function(c){ return '<div><div class="v">'+esc(c[0])+'</div><div class="l">'+esc(c[1])+'</div></div>'; }).join('')+'</div>';
      else if(b.t==='log') h='<div class="nwsLog">'+b.rows.map(function(r){ return '<div><div class="t">'+esc(r.title)+(r.date?' <span>'+esc(r.date)+'</span>':'')+'</div><div class="m">'+esc(r.meta)+'</div></div>'; }).join('')+'</div>';
      else if(b.t==='leader') h='<div class="nwsLdr">'+b.rows.map(function(r){ return '<div><span class="n">'+esc(r[0])+'</span><span class="d"></span><span class="v">'+esc(r[1])+'</span></div>'; }).join('')+(b.total?'<div class="tot"><span class="n">'+esc(b.total[0])+'</span><span style="flex:1;"></span><span class="v">'+esc(b.total[1])+'</span></div>':'')+'</div>';
      else if(b.t==='box') h='<div class="nwsBox"><div class="cap2"></div>'+(b.rows?b.rows.map(function(r){ return '<div class="row"><span class="k">'+esc(r[0])+'</span><span>'+esc(r[1])+'</span></div>'; }).join(''):(b.blocks||[]).map(nwsBlock).join(''))+'</div>';
      else if(b.t==='link') h='<a class="nwsLink" href="'+esc(b.href)+'" target="_blank" rel="noopener">'+esc(b.text)+'</a>';
      return h;
    }
    function buildNews(){
      if(newsBuilt) return; newsBuilt=true;
      var I=window.COR_ISSUE, sc=el('nwsFlow');
      var h='<div class="nwsMastP"><div class="r3"></div><div class="r1"></div><div class="nm">Chronicles of Revival</div><div class="ed">FAMILY FIRE CONFERENCE EDITION</div><div class="folio"><span>VOL. '+I.vol+' · NO. '+I.no+'</span><span>'+I.edition.toUpperCase()+'</span><span class="souls">SOULS: '+I.souls+'</span></div></div>';
      I.sections.forEach(function(s,i){
        if(i>0) h+='<div class="nwsDiv"><i></i><b></b><i></i></div>';
        h+='<div class="nwsSec" data-nws="'+i+'"><div class="nwsK">'+esc(s.kicker)+'</div><div class="nwsH1">'+esc(s.title)+'</div>'+(s.byline?'<div class="nwsBy">'+esc(s.byline)+'</div>':'')+s.blocks.map(nwsBlock).join('')+'<div style="clear:both;"></div></div>';
      });
      h+='<div class="nwsEnd">— END OF ISSUE · '+I.pages+' PAGES —</div>';
      sc.innerHTML=h;
      sc=el('nwsScroll');
      newsSecEls=[].slice.call(sc.querySelectorAll('[data-nws]'));
      /* contents sheet */
      var sh='<div class="nwsShHandle"></div><div class="nwsShHead"><span class="t">Inside this issue</span><button class="nwsShX" id="nwsShX" aria-label="Close contents"><svg width="12" height="12" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M2 2l10 10M12 2L2 12"/></svg></button></div>';
      sh+='<div class="nwsShSub">'+I.edition.toUpperCase()+' · VOL. '+I.vol+' NO. '+I.no+' · '+I.pages+' PAGES</div><div class="nwsToc" id="nwsToc">';
      I.sections.forEach(function(s,i){ sh+='<button class="nwsTocRow" data-nwsjump="'+i+'"><span class="n">'+esc(s.toc)+'</span><span class="d"></span><span class="p">PG '+s.page+'</span></button>'; });
      sh+='</div><div class="nwsShFoot"><span class="lbl">APPEARANCE</span><span class="nwsChips"><button class="nwsChip" data-nwstheme="paper">Paper</button><button class="nwsChip" data-nwstheme="ink">Ink</button></span></div>';
      el('nwsSheet').innerHTML=sh;
      el('nwsShX').addEventListener('click', function(){ nwsSheet(false); });
      [].slice.call(el('nwsToc').querySelectorAll('[data-nwsjump]')).forEach(function(r){
        r.addEventListener('click', function(){ nwsJump(parseInt(r.getAttribute('data-nwsjump'),10)); });
      });
      [].slice.call(el('nwsSheet').querySelectorAll('[data-nwstheme]')).forEach(function(c){
        c.addEventListener('click', function(){ setNewsTheme(c.getAttribute('data-nwstheme')); });
      });
      sc.addEventListener('scroll', function(){ if(!newsRaf){ newsRaf=setTimeout(nwsSpy,60); } });
      applyNewsTheme();
      nwsPaint();
    }
    function applyNewsTheme(){
      var t=nwsTheme(), root=el('shellNews');
      root.classList.toggle('paper', t==='paper');
      root.classList.toggle('ink', t==='ink');
      el('nwsLbl').textContent = t==='paper' ? 'FIRE CONF · NEWSPAPER' : 'NEWSPAPER';
      var mt=document.querySelector('meta[name=theme-color]'); if(mt) mt.setAttribute('content', t==='paper'?'#f6f1e7':'#141415');
      [].slice.call(root.querySelectorAll('[data-nwstheme]')).forEach(function(c){ c.classList.toggle('on', c.getAttribute('data-nwstheme')===t); });
    }
    function setNewsTheme(t){
      try{ localStorage.setItem('fc_news_theme', t); }catch(e){}
      var root=el('shellNews');
      root.classList.add('fading');
      setTimeout(function(){ applyNewsTheme(); root.classList.remove('fading'); }, 160);
      trackEvent('news_theme',{theme:t});
    }
    function nwsPaint(){
      var I=window.COR_ISSUE, s=I.sections[newsSec], pct=Math.round(s.page/I.pages*100);
      el('nwsPill').innerHTML='<span style="font-size:14px;line-height:1;">☰</span><span>Inside this issue</span><span class="pg">PG '+s.page+' · '+pct+'%</span>';
      var rows=el('nwsToc')?el('nwsToc').querySelectorAll('.nwsTocRow'):[];
      [].slice.call(rows).forEach(function(r,i){ r.classList.toggle('on', i===newsSec); });
    }
    function nwsSpy(){
      newsRaf=0;
      if(nwsAnim) return; /* keep the committed target section during an animated jump */
      var sc=el('nwsScroll'), top=sc.scrollTop, cur=0;
      for(var i=0;i<newsSecEls.length;i++){ if(newsSecEls[i].offsetTop-60<=top) cur=i; else break; }
      if(cur!==newsSec){ newsSec=cur; nwsPaint(); }
    }
    var nwsAnim=0;
    function nwsScrollTo(target){
      /* timer-driven eased scroll: element.scrollTo({behavior:'smooth'}) silently
         no-ops on older iOS Safari, and rAF can be suspended in embedded webviews */
      var sc=el('nwsScroll'), from=sc.scrollTop, dist=target-from, t0=performance.now(), DUR=460;
      clearTimeout(nwsAnim);
      function ease(x){ return x<0.5 ? 4*x*x*x : 1-Math.pow(-2*x+2,3)/2; }
      function step(){
        var p=Math.min(1,(performance.now()-t0)/DUR);
        sc.scrollTop=from+dist*ease(p);
        if(p<1) nwsAnim=setTimeout(step,16);
        else { nwsAnim=0; nwsSpy(); }
      }
      nwsAnim=setTimeout(step,0);
    }
    function nwsJump(i){
      newsSec=i; nwsPaint(); nwsSheet(false);
      var sec=newsSecEls[i]; if(sec) nwsScrollTo(Math.max(0,sec.offsetTop-6));
      trackEvent('news_jump',{section:window.COR_ISSUE.sections[i].id});
    }
    function nwsSheet(open){ el('shellNews').classList.toggle('sheet', !!open); }
    function savePos(){ try{ localStorage.setItem('fc_news_pos', String(el('nwsScroll').scrollTop)); }catch(e){} }
    function leaveNews(){
      savePos();
      if(history.length>1 && document.referrer.indexOf(location.origin)===0) history.back();
      else location.href='/';
    }
    function initNews(){
      buildNews();
      try{
        localStorage.setItem('fc_news_opened','1');
        var pos=parseInt(localStorage.getItem('fc_news_pos')||'0',10);
        if(pos>0) el('nwsScroll').scrollTop=pos;
      }catch(e){}
      nwsSpy();
      /* poll fallback: some webviews suspend scroll events entirely */
      if(!newsPoll) newsPoll=setInterval(function(){
        var t=el('nwsScroll').scrollTop;
        if(t!==newsLastTop){ newsLastTop=t; nwsSpy(); }
      }, 400);
      var src=(location.search.match(/[?&]src=([a-z]+)/)||[])[1]||'direct';
      trackEvent('news_open',{src:src});
      window.addEventListener('pagehide', savePos);
      document.addEventListener('visibilitychange', function(){ if(document.visibilityState==='hidden') savePos(); });
      document.addEventListener('keydown', function(e){
        if(e.key==='Escape'||e.key==='Esc'){ if(el('shellNews').classList.contains('sheet')) nwsSheet(false); else leaveNews(); }
      });
      el('nwsBack').addEventListener('click', leaveNews);
      el('nwsAa').addEventListener('click', function(){ setNewsTheme(nwsTheme()==='paper'?'ink':'paper'); });
      el('nwsPill').addEventListener('click', function(){ nwsSheet(true); });
      el('nwsScrim').addEventListener('click', function(){ nwsSheet(false); });
    }
    initNews();

})();
</script>
</body>
