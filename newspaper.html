<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;overscroll-behavior:none;}
  /* ============ Chronicles of Revival reader ============ */
  #shellNews{position:fixed;inset:0;display:flex;flex-direction:column;transition:opacity .28s ease;}
  
  #shellNews.fading{opacity:0;}
  /* ---- Paper (newsprint) theme ---- */
  #shellNews.paper{background:#f6f1e7;color:#201d16;font-family:Georgia,'Times New Roman',serif;}
  .nwsChrome{max-width:656px;width:100%;margin:0 auto;padding:max(18px,env(safe-area-inset-top,18px)) 18px 8px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .nwsBack,.nwsAa,.nwsMark{width:34px;height:34px;border-radius:50%;flex:0 0 auto;display:flex;align-items:center;justify-content:center;cursor:pointer;background:none;border:0;padding:0;font-family:inherit;}
  #shellNews.paper .nwsBack,#shellNews.paper .nwsAa{border:1px solid rgba(32,29,22,0.3);color:#201d16;}
  .nwsBack i{width:8px;height:8px;border-left:2px solid currentColor;border-bottom:2px solid currentColor;transform:rotate(45deg);margin-left:3px;}
  .nwsLbl{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:2px;flex:1;text-align:center;white-space:nowrap;overflow:hidden;}
  #shellNews.paper .nwsLbl{color:#8a8171;}
  .nwsAa .a1{font-size:10px;line-height:1;}.nwsAa .a2{font-size:14px;line-height:1;}
  #shellNews.paper .nwsMark{display:none;}
  /* masthead (paper) */
  .nwsMastP{padding:2px 0 0;text-align:center;}
  .nwsMastP .r3{border-top:3px solid #201d16;margin-bottom:2px;}
  .nwsMastP .r1{border-top:1px solid #201d16;padding-top:8px;}
  .nwsMastP .nm{font-family:'Fraunces',Georgia,serif;font-weight:600;font-size:29px;letter-spacing:-0.5px;line-height:1;}
  .nwsMastP .ed{font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:1.6px;color:#6b6353;margin-top:7px;}
  .nwsMastP .folio{display:flex;justify-content:space-between;border-top:1px solid rgba(32,29,22,0.55);border-bottom:2px solid #201d16;margin-top:7px;padding:4px 2px;}
  .nwsMastP .folio span{font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:1.2px;}
  .nwsMastP .folio .souls{color:#a63c17;}
  #shellNews.ink .nwsMastP{display:none;}
  /* scroll flow */
  .nwsScroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0;position:relative;scrollbar-width:none;touch-action:pan-y;overscroll-behavior-y:contain;}
  .nwsScroll::-webkit-scrollbar{display:none;}
  .nwsScroll::before{content:"";float:left;width:0;height:calc(100% + 1px);}
  .nwsSec{padding-top:18px;}
  .nwsDiv{display:flex;align-items:center;gap:12px;padding:20px 0;}
  .nwsDiv i{flex:1;border-top:1px solid rgba(32,29,22,0.3);}
  .nwsDiv b{width:6px;height:6px;background:rgba(32,29,22,0.5);transform:rotate(45deg);flex:0 0 auto;}
  /* blocks — paper values; ink overrides come in phase 2 */
  .nwsK{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:2px;color:#a63c17;margin-bottom:6px;}
  .nwsH1{font-family:'Fraunces',Georgia,serif;font-weight:600;font-size:23px;line-height:1.12;margin-bottom:7px;}
  .nwsBy{font-size:calc(12.5px*var(--fz,1));font-style:italic;color:#6b6353;border-bottom:1px solid rgba(32,29,22,0.25);padding-bottom:8px;margin-bottom:10px;}
  .nwsDek{font-size:calc(14px*var(--fz,1));font-style:italic;color:#6b6353;margin-bottom:12px;}
  .nwsP{font-size:calc(16px*var(--fz,1));line-height:1.62;text-align:justify;margin:0 0 10px;color:#2a261d;hyphens:none;-webkit-hyphens:none;}
  .nwsDC{float:left;font-family:'Fraunces',Georgia,serif;font-weight:600;font-size:50px;line-height:0.8;padding:5px 7px 0 0;}
  .nwsSig{font-size:calc(14.5px*var(--fz,1));font-style:italic;color:#2a261d;margin:0 0 6px;}

  .nwsH3{font-family:'Fraunces',Georgia,serif;font-weight:600;font-size:15px;margin:0 0 4px;}

  .nwsPhR{float:right;width:126px;margin:3px 0 8px 12px;}
  .nwsPhR img{width:100%;display:block;border:1px solid rgba(32,29,22,0.35);background:rgba(32,29,22,0.08);}
  .nwsPhR .nwsCap{margin:4px 0 0;font-size:calc(8.5px*var(--fz,1));letter-spacing:0.8px;}
  .nwsStrip{display:flex;gap:6px;overflow-x:auto;margin:0 calc(var(--gut,18px)*-1);padding:0 var(--gut,18px);scrollbar-width:none;-webkit-overflow-scrolling:touch;touch-action:pan-x;}
  .nwsStrip::-webkit-scrollbar{display:none;}
  .nwsStrip img{height:92px;width:auto;border:1px solid rgba(32,29,22,0.35);display:block;flex:0 0 auto;background:rgba(32,29,22,0.08);}
  .nwsStrip.tall img{height:118px;}
  .nwsQ{border-top:1px solid rgba(32,29,22,0.45);border-bottom:1px solid rgba(32,29,22,0.45);padding:13px 10px;margin:0 0 12px;text-align:center;}
  .nwsQ .q{font-size:calc(18px*var(--fz,1));font-style:italic;line-height:1.4;}
  .nwsQ .a{font-family:'IBM Plex Mono',monospace;font-size:calc(9.5px*var(--fz,1));letter-spacing:1.5px;color:#a63c17;margin-top:6px;}
  .nwsStats{display:flex;gap:10px;margin-bottom:14px;}
  .nwsStats>div{flex:1;border-top:2.5px solid #201d16;padding-top:7px;}
  .nwsStats .v{font-family:'Fraunces',Georgia,serif;font-weight:600;font-size:calc(19px*var(--fz,1));}
  .nwsStats .l{font-family:'IBM Plex Mono',monospace;font-size:calc(9px*var(--fz,1));letter-spacing:1px;color:#6b6353;margin-top:2px;}
  .nwsLog{border-top:2px solid #201d16;}

  .nwsLog>a{padding-right:22px;}
  .nwsLog>a .ch{position:absolute;right:6px;top:50%;width:8px;height:8px;border-right:2px solid #a63c17;border-top:2px solid #a63c17;transform:translateY(-50%) rotate(45deg);}
  .nwsLog .t{font-size:calc(14px*var(--fz,1));font-weight:bold;}

  .nwsLdr .v{font-family:'IBM Plex Mono',monospace;font-size:calc(12px*var(--fz,1));}
  .nwsLdr .tot{border-top:1px solid #201d16;border-bottom:2.5px solid #201d16;padding:7.5px 0;}
  .nwsLdr .tot .n{font-size:calc(14.5px*var(--fz,1));font-weight:bold;}
  .nwsLdr .tot .v{font-size:calc(13px*var(--fz,1));font-weight:bold;color:#a63c17;}
  .nwsBox{border:1px solid rgba(32,29,22,0.45);padding:11px 12px;margin-top:16px;}
  .nwsBox .cap2{border-top:2px solid #201d16;margin:-11px -12px 9px;padding-top:2px;}
  .nwsBox .row{display:flex;gap:10px;font-size:calc(12.5px*var(--fz,1));line-height:1.5;margin-bottom:5px;}
  .nwsBox .row:last-child{margin-bottom:0;}
  .nwsBox .row .k{font-family:'IBM Plex Mono',monospace;font-size:calc(9px*var(--fz,1));letter-spacing:1px;color:#a63c17;width:92px;flex:0 0 auto;padding-top:2px;}
  .nwsLink{display:block;font-family:'IBM Plex Mono',monospace;font-size:calc(10.5px*var(--fz,1));letter-spacing:1px;color:#a63c17;text-decoration:none;margin:2px 0 12px;padding:4px 0;}
  .nwsCols{font-family:'IBM Plex Mono',monospace;font-size:calc(10px*var(--fz,1));line-height:1.85;color:#6b6353;column-count:2;column-gap:14px;margin:0 0 12px;}
  #shellNews.ink .nwsCols{color:#77777e;}
  .nwsSoc2{margin:0 0 12px;}

  #shellNews.paper .nwsSoc2 a{border-bottom:1px solid rgba(32,29,22,0.2);}
  #shellNews.ink .nwsSoc2 a{border-bottom:1px solid rgba(255,255,255,0.07);}
  .nwsSoc2 .ic{width:32px;height:32px;border-radius:50%;flex:0 0 auto;display:flex;align-items:center;justify-content:center;}
  .nwsSoc2 .ic svg{width:15px;height:15px;display:block;}
  #shellNews.paper .nwsSoc2 .ic{border:1px solid rgba(32,29,22,0.4);color:#a63c17;}
  #shellNews.ink .nwsSoc2 .ic{background:rgba(255,92,31,0.16);color:#ff5c1f;}
  .nwsSoc2 .lb{font-size:calc(13.5px*var(--fz,1));font-weight:bold;line-height:1.25;}
  .nwsSoc2 .lb i{display:block;font-style:normal;font-weight:normal;font-family:'IBM Plex Mono',monospace;font-size:calc(9px*var(--fz,1));letter-spacing:1px;margin-top:2px;}
  #shellNews.paper .nwsSoc2 .lb i{color:#8a8171;}
  #shellNews.ink .nwsSoc2 .lb i{color:#77777e;}
  .nwsSoc2 .ch{position:absolute;right:4px;top:50%;width:8px;height:8px;border-right:2px solid currentColor;border-top:2px solid currentColor;transform:translateY(-50%) rotate(45deg);opacity:0.5;}
  #shellNews.ink .nwsSoc2 a{color:#fff;}
  .nwsEnd{text-align:center;font-family:'IBM Plex Mono',monospace;font-size:8.5px;letter-spacing:2px;color:#8a8171;padding:26px 0 8px;}
  /* bottom pill (paper) */
  .nwsPill{position:absolute;left:50%;transform:translateX(-50%);bottom:calc(16px + env(safe-area-inset-bottom,0px));z-index:5;
    background:#201d16;color:#f6f1e7;border:0;border-radius:999px;padding:12px 17px;display:flex;align-items:center;gap:9px;cursor:pointer;
    box-shadow:0 10px 30px rgba(32,29,22,0.4);font-family:'Archivo',sans-serif;font-size:12.5px;font-weight:600;white-space:nowrap;}
  .nwsPill .pg{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:1px;color:rgba(246,241,231,0.75);border-left:1px solid rgba(246,241,231,0.3);padding-left:9px;}
  #shellNews.ink .nwsPill{display:none;}
  /* contents sheet (paper skin) */
  .nwsScrim{position:absolute;inset:0;z-index:8;background:rgba(25,20,8,0.45);opacity:0;pointer-events:none;transition:opacity .28s ease;}
  #shellNews.sheet .nwsScrim,#shellNews.set .nwsScrim{opacity:1;pointer-events:auto;}
  .nwsSheet{position:absolute;left:0;right:0;bottom:0;z-index:9;max-height:74%;display:flex;flex-direction:column;
    border-radius:22px 22px 0 0;transform:translateY(103%);transition:transform .28s ease;}
  #shellNews.sheet .nwsSheet{transform:translateY(0);}
  #shellNews.paper .nwsSheet{background:url('/cor/paper-grain.png') repeat, #faf6ec;color:#201d16;box-shadow:0 -14px 40px rgba(32,29,22,0.35);}
  .nwsShHandle{width:40px;height:4px;border-radius:2px;background:rgba(32,29,22,0.25);margin:10px auto 6px;flex:0 0 auto;}
  .nwsShHead{display:flex;align-items:center;justify-content:space-between;padding:2px 18px 0;flex:0 0 auto;max-width:656px;width:100%;margin:0 auto;}
  #shellNews.paper .nwsShHead .t{font-family:'Fraunces',Georgia,serif;font-weight:600;font-size:21px;}
  .nwsShX{width:32px;height:32px;border-radius:50%;border:1px solid rgba(32,29,22,0.3);background:none;color:inherit;display:flex;align-items:center;justify-content:center;cursor:pointer;padding:0;}
  .nwsShSub{font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:1.4px;color:#8a8171;padding:6px 18px 10px;border-bottom:1px solid rgba(32,29,22,0.25);flex:0 0 auto;max-width:656px;width:100%;margin:0 auto;}
  .nwsToc{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:4px 18px;min-height:0;max-width:656px;width:100%;margin:0 auto;}
  .nwsTocRow{display:flex;align-items:baseline;gap:10px;width:100%;padding:10px 0;background:none;border:0;border-bottom:1px solid rgba(32,29,22,0.14);cursor:pointer;font-family:inherit;color:inherit;text-align:left;}
  .nwsTocRow .n{font-size:14px;font-family:Georgia,serif;}
  .nwsTocRow .d{flex:1;border-bottom:2px dotted rgba(32,29,22,0.3);transform:translateY(-3px);}
  .nwsTocRow .p{font-family:'IBM Plex Mono',monospace;font-size:10px;color:#6b6353;}
  #shellNews.paper .nwsTocRow.on .n{color:#a63c17;font-weight:bold;}
  #shellNews.paper .nwsTocRow.on .p{color:#a63c17;}
  .nwsShFoot{display:flex;align-items:center;justify-content:space-between;padding:12px 18px calc(14px + env(safe-area-inset-bottom,0px));border-top:1px solid rgba(32,29,22,0.25);flex:0 0 auto;max-width:656px;width:100%;margin:0 auto;}
  .nwsShFoot .lbl{font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:1.4px;color:#8a8171;}
  .nwsChips{display:flex;gap:7px;}
  .nwsChip{border-radius:999px;padding:7px 14px;font-family:'Archivo',sans-serif;font-size:11.5px;font-weight:600;cursor:pointer;}
  #shellNews.paper .nwsChip{border:1px solid rgba(32,29,22,0.4);background:none;color:#201d16;}
  #shellNews.paper .nwsChip.on{background:#201d16;color:#f6f1e7;border-color:#201d16;}
  .nwsFlow{--gut:max(18px, calc((100% - 620px)/2));padding:0 var(--gut) 130px;min-height:100%;}
  .nwsFlow img{cursor:zoom-in;}
  .nwsLight{position:fixed;inset:0;z-index:40;background:rgba(8,8,9,0.97);display:none;flex-direction:column;}

  .nwsLight .stage img{max-width:100%;max-height:100%;border-radius:4px;will-change:transform;user-select:none;-webkit-user-drag:none;
    transform-origin:0 0;box-shadow:0 20px 80px rgba(0,0,0,0.7);}
  .nwsLight .foot{flex:0 0 auto;padding:12px 20px calc(18px + env(safe-area-inset-bottom,0px));text-align:center;}
  .nwsLight .cap{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:1.2px;color:#9a9aa2;line-height:1.6;max-width:360px;margin:0 auto;}
  .nwsLight .cnt{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:1.5px;color:#77777e;margin-top:8px;}

  .nwsLight .ig svg{flex:0 0 auto;}
  .nwsLight .x{position:absolute;top:max(16px,env(safe-area-inset-top,16px));right:16px;z-index:3;width:38px;height:38px;border-radius:50%;
    background:rgba(255,255,255,0.12);border:0;color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;}
  .nwsLight .nav{position:absolute;top:50%;transform:translateY(-50%);z-index:3;width:40px;height:40px;border-radius:50%;
    background:rgba(255,255,255,0.1);border:0;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .nwsLight .nav.prev{left:12px;} .nwsLight .nav.next{right:12px;}
  .nwsLight .nav:disabled{opacity:0.25;}
  .nwsLight .nav i{width:9px;height:9px;border-left:2.5px solid currentColor;border-bottom:2.5px solid currentColor;display:block;}
  .nwsLight .nav.prev i{transform:rotate(45deg);margin-left:4px;} .nwsLight .nav.next i{transform:rotate(-135deg);margin-right:4px;}
  @media (pointer:coarse){ .nwsLight .nav{display:none;} }
  #shellNews.paper .nwsFlow{background:url('/cor/paper-grain.png') repeat, #f6f1e7;}

<script>
  /* Chronicles of Revival - July 2026 issue. Content ported from the design handoff
     (canvas 5a = canonical copy). Complete issue: all 16 sections. */
  window.COR_ISSUE={
    edition:'July 2026', vol:'7', no:'05', pages:24, souls:'58,835,324', readMins:18,
    sections:[
      {id:'welcome', toc:'Welcome', page:2, kicker:'WELCOME · PAGE 2',
       title:'Welcome to the 3‑in‑1 Family Fire Conference',
       byline:'By Drs. Rodney & Adonica Howard‑Browne',
       blocks:[
        {t:'photoR', src:'p02-1.jpg', alt:'Drs. Rodney and Adonica Howard-Browne', cap:'DRS. RODNEY & ADONICA HOWARD‑BROWNE'},
        {t:'drop', text:'We’re thrilled to welcome you to our annual 3‑in‑1 Family Fire Conference! This is one of our favorite weeks of the year, as families from around the world gather to encounter God together.'},
        {t:'p', text:'From the very beginning, God designed the family to be a place where His presence dwells and where faith is passed from one generation to the next. This week is about raising up strong families, passionate young people, and children who know God and are unashamed of the Gospel.'},
        {t:'p', text:'Take every opportunity to be in every service. Come expecting His Word to strengthen you, His presence to refresh you, and His power to transform your life. God always meets those who are hungry — and this week, you will be marked for eternity.'},
        {t:'sig', lines:['For the Harvest,','Drs. Rodney & Adonica Howard‑Browne']},
        {t:'box', rows:[['PUBLISHER','Revival Ministries International'],['EDITOR-IN-CHIEF','Dr. Rodney Howard‑Browne'],['MANAGING EDITOR','Dr. Adonica Howard‑Browne'],['EDITORIAL ASSTS.','Somalia Alsobrooks · Darrain & Christine Matthews']]},
        {t:'h2', text:'About: Drs. Rodney & Adonica Howard‑Browne', sub:'UPDATED JULY 2026'},
        {t:'p', text:'Drs. Rodney and Adonica Howard‑Browne are the founders of Revival Ministries International (R.M.I.), The River at Tampa Bay Church, and River University – River Bible Institute (R.U.) in Tampa, Florida.'},
        {t:'p', text:'In December of 1987, Rodney, along with his wife, Adonica, and their three children, Kirsten, Kelly, and Kenneth, moved from their native land, South Africa, to the United States, called by God as missionaries from Africa to America. In a word of prophecy spoken through Rodney, the Lord said, “As America has sown missionaries over the last 200 years, I am going to raise up people from other nations to come to the United States of America. I am sending a mighty revival to America.”'},
        {t:'p', text:'In April of 1989, the Lord sent a revival of signs, wonders, and miracles that began in a church in Clifton Park, New York. That revival has continued, resulting in thousands of people being touched and changed as they encounter the presence of the living God. God is still moving today—saving, healing, delivering, restoring, and setting people free!'},
        {t:'p', text:'Drs. Rodney and Adonica’s second daughter, Kelly, was born with an incurable lung disease called cystic fibrosis. Early on Christmas morning in 2002, at the age of 18, she ran out of lung capacity and breathed out her last breath. They placed her into the arms of her Lord and Savior, and vowed that the devil would pay for what he had done to their family — and to do everything in their power, with the help of the Lord, to win 100 million souls to Jesus and to put $1 billion into world missions and the harvest of souls.'},
        {t:'p', text:'Believing for a Great Spiritual Awakening, they conducted Celebrate America D.C., a massive soul‑winning event, preaching the Gospel for 50 nights in Washington, D.C. and surrounding areas from 2014 to 2019 — 58,033 individuals made decisions for Jesus Christ. During the Covid era they took a stand for the Gospel and our God‑given liberties; The Stand nightly services have continued for over 2,220 nights.'},
        {t:'p', text:'With a passion for souls, they have conducted revivals and soul‑winning efforts throughout 101 nations with the 500 City World Tour, Good News campaigns, R.M.I. Revivals, the Great Awakening Tours and television, and The Stand. As a result, over 58,835,324 precious people have received salvation or recommitted their lives to Christ at the time of this publication. For more information, visit revival.com.'}
       ]},
      {id:'books', toc:'Book Release', page:3, kicker:'BOOK RELEASE · PAGE 3',
       title:'New Books Are Out and Ready for You!',
       blocks:[
        {t:'dek', text:'Stop by the bookstore and grab them all before they’re gone — fresh titles for Summer campmeeting are here now.'},
        {t:'strip', tall:true, imgs:[['p03-8.jpg','12 Qualifications and Responsibilities of Leadership'],['p03-9.jpg','This Is Your Jubilee'],['p03-0.jpg','The Source of Your Joy'],['p03-1.jpg','The Holy Spirit in the Life of Holiness'],['p03-10.jpg','Run to the Roar'],['p03-4.jpg','Diligence in Business'],['p03-5.jpg','Righteous']]},
        {t:'cap', text:'NEW TITLES AT THE CAMPMEETING BOOKSTORE · PG. 3'},
        {t:'h2', text:'12 Qualifications and Responsibilities of Leadership'},
        {t:'dek', text:'By Dr. Rodney Howard‑Browne'},
        {t:'p', text:'Leadership today is often measured by power, popularity, and influence. However, Heaven measures it by something far greater: character, integrity, and the fear of the Lord. This book is a clear, uncompromising call back to God’s standard — every leader, whether in the home, the Church, the marketplace, or government, is under authority and will give an account to Almighty God.'},
        {t:'p', text:'You will discover the biblical qualifications that define true leadership: obedience to God’s Word, a pure heart, wisdom, honesty, and courage in the face of pressure. It also exposes the subtle compromises that weaken leadership and equips you to lead with righteousness and boldness in a world that rewards the opposite.'},
        {t:'h2', text:'This Is Your Jubilee'},
        {t:'dek', text:'By Dr. Rodney Howard‑Browne'},
        {t:'p', text:'The acceptable year of the Lord is not a date on a calendar — it is a present reality in Christ. When Jesus declared, “This day is this scripture fulfilled,” He announced the arrival of permanent Jubilee: freedom for the captive, restoration for the broken, and the overflowing favor of God for every believer.'},
        {t:'p', text:'This book confronts every religious mindset that keeps people bound to lack, fear, and striving. You will be challenged to step out of a survival mindset and into a life of faith and supernatural supply. You were not redeemed to struggle — you were redeemed to live in God’s blessing and prosperity. Your Jubilee is now.'},
        {t:'link', text:'PURCHASE ONLINE · STORE.REVIVAL.COM · OR VISIT THE BOOKSTORE', href:'https://store.revival.com/'}

      {id:'dc', toc:'Celebrate America D.C.', page:5, kicker:'UPDATE · PAGE 5',
       title:'The Great Awakening Is Happening!',
       blocks:[
        {t:'dek', text:'Celebrate America D.C. — carrying the fire across the DMV since June 24'},
        {t:'stats', cells:[['357,872','SOULS RECORDED'],['5,175','LABORERS'],['326','CITIES TO DATE']]},
        {t:'h3', text:'Soul Harvest Summary'},
        {t:'leader', rows:[['Streets','203,111'],['HUB Churches','72,207'],['GEO Targeting DMV','55,901'],['Nursing Homes','20,511'],['Altar Call Outreach','3,557'],['Altar Call · One Night Rallies','1,571'],['Faith & Family Booth','1,014']], total:['Grand Total Souls','357,872']},
        {t:'photo', src:'p05-1.jpg', alt:'Crowd at a Celebrate America D.C. rally', cap:'CROWDS AT A CELEBRATE AMERICA D.C. RALLY · PG. 5'},
        {t:'p', text:'Since launching Celebrate America DC on June 24th, we’ve seen America being awakened before our eyes. From the streets, the National Mall, buses, trains, nursing homes, prisons, one‑night Holy Ghost rallies, and massive community outreaches, we are carrying the fire of God and reaching the lost.'},
        {t:'p', text:'By God’s grace and favor, over 357,872 souls have already been recorded through the efforts of 5,175 laborers — God is on our side, surpassing our 250,000‑soul goal before the crusade ends on July 10.'},
        {t:'p', text:'Behind each of those numbers is a life changed forever and an eternity rewritten. What moves our hearts most is watching believers who have never led one person to Christ come to our training sessions, step onto the National Mall, and lead whole groups of people to Jesus in the same afternoon. God does not need perfect vessels — He needs those who are yielding and willing.'},
        {t:'p', text:'As part of the Great American State Fair, the Revival Ministries International exhibit booth at the Faith and Family Pavilion has been a hit! We are the only ministry in the building preaching the Gospel of Jesus Christ. This is not a coincidence, but a divine appointment.'},
        {t:'strip', imgs:[['p05-0.jpg','D.C. memorial outreach'],['p05-2.jpg','Rally stage'],['p05-3.jpg','Preaching at the rally'],['p05-4.jpg','Prayer at the altar'],['p05-5.jpg','Celebrate America crowd panorama']]},
        {t:'cap', text:'SCENES FROM THE D.M.V. · PG. 5'},
        {t:'box', blocks:[{t:'dek', text:'Be on the lookout for our upcoming Special Edition: the Celebrate America D.C. recap newspaper.'}]}
       ]},
      {id:'fire-home', toc:'The Fire That Starts at Home', page:8, kicker:'FEATURE · PAGE 8',
       title:'The Fire That Starts at Home',
       byline:'By Drs. Rodney & Adonica Howard‑Browne',
       blocks:[
        {t:'photo', src:'p08-0.jpg', alt:'The Fire That Starts at Home — feature art', cap:'FEATURE ART FROM THE PRINT EDITION · PG. 8'},
        {t:'drop', text:'The fire of God was never meant to stay within the four walls of a church. It was meant to burn in every home. From the beginning, God established the family as the foundation of society — a place where His presence is honored, His Word is lived, and one generation declares His works to the next.'},
        {t:'quote', text:'“As for me and my house, we will serve the LORD.”', attr:'— JOSHUA 24:15'},
        {t:'p', text:'God’s fire will set your home ablaze with purpose. God has a plan for every husband, every wife, every child, and every family. As you seek Him together, He will direct your steps and establish your home according to His Word.'},
        {t:'p', text:'God’s fire will unify, restore, and realign your family. God’s Word declares, “Behold, how good and how pleasant it is for brethren to dwell together in unity!” (Psalm 133:1). Where there is forgiveness, humility, and love, the Lord commands His blessing.'},
        {t:'p', text:'God’s fire will give your family boldness to fulfill God’s purpose together. Jesus said, “Ye are the light of the world” (Matthew 5:14). Your family was never called to blend into the darkness. You are called to shine, stand for truth, and be a witness of God’s goodness wherever He sends you.'},
        {t:'p', text:'God’s fire will mark your marriage and your children. The Lord desires homes where husbands love, wives flourish, children are established in His ways, and every generation grows in the knowledge of Him.'},
        {t:'quote', text:'“Train up a child in the way he should go: and when he is old, he will not depart from it.”', attr:'— PROVERBS 22:6'},
        {t:'p', text:'Our world desperately needs families that burn with the fire of God. Homes filled with faith become places of peace. Homes built on God’s Word become places of strength. Families that seek the Lord together become living testimonies of His power and grace.'},
        {t:'p', text:'We believe God wants to do more than touch individuals this week. He wants to strengthen entire families. As His fire fills your heart, let it fill your home. Let it transform your marriage, your children, and your future.'},
        {t:'p', text:'“For our God is a consuming fire” (Hebrews 12:29). May His fire burn brightly in your family, and may your home become a light that points others to Jesus Christ.'}
       ]},
      {id:'everywhere', toc:'Revival Everywhere You Go!', page:10, kicker:'BOOKSHELF · PAGE 10',
       title:'Revival Everywhere You Go!',
       blocks:[
        {t:'dek', text:'Four more titles from Dr. Rodney Howard‑Browne to carry the fire home.'},
        {t:'strip', tall:true, imgs:[['p10-4.jpg','Prayer and Fasting'],['p10-5.jpg','The Gift of Faith'],['p10-6.jpg','The Five Pillars of Establishment'],['p10-7.jpg','The Marks of a Good Pastor']]},
        {t:'h2', text:'Prayer & Fasting'},
        {t:'p', text:'Dr. Rodney cuts through tradition and routine, calling believers to a lifestyle of true spiritual power through relationship, not ritual. Fasting is not a ritual, and prayer is not empty words — this book will propel you to build a consistent, powerful prayer life, hear God’s voice, and walk in spiritual authority that produces results.'},
        {t:'h2', text:'The Gift of Faith'},
        {t:'p', text:'In a world gripped by fear and shaking foundations, God is raising up a victorious Church empowered by supernatural faith. Drawing from Scripture, personal testimony, and decades of ministry, this book reveals how the gift of faith operates as a divine impartation — how to activate it, stand firm in adversity, and walk in the miraculous.'},
        {t:'h2', text:'The Five Pillars of Establishment'},
        {t:'p', text:'Your faith declaration to see what God has spoken brought into order, secured, and made permanent. Dr. Rodney reveals five key operations God uses to establish His work: Divine Order, Divine Fulfillment, Divine Alignment, Divine Manifestation, and Divine Harvest. As you align with God’s Word, stability replaces uncertainty and fulfillment replaces delay.'},
        {t:'h2', text:'The Marks of a Good Pastor'},
        {t:'p', text:'Pastoral ministry is not defined by personality, platform, or popularity — it is defined by Scripture. Rooted in God’s Word, it explores the character, calling, motives, anointing, and accountability of true under‑shepherds: how to discern a genuine divine call, the non‑negotiable character standards of leadership, and what it truly means to shepherd God’s people with courage and compassion.'},
        {t:'link', text:'SCAN‑TO‑PURCHASE QR CODES IN PRINT → TAP A COVER TO BUY IN‑APP', href:'https://store.revival.com/collections/books'}
       ]},
      {id:'ru-grad', toc:'River University Graduation', page:11, kicker:'CAMPUS · PAGE 11',
       title:'River University – Bible Institute Graduation',
       blocks:[
        {t:'photo', src:'p11-5.jpg', alt:'River University graduates celebrate', cap:'THE CLASS OF 2026 IS COMMISSIONED · MAY 25, 2026'},
        {t:'p', text:'During the As Real As It Gets Spring Ministers’ & Leaders’ Conference, River University celebrated another milestone as graduates from the River University Bible Institute were commissioned on Sunday, May 25, 2026. This special service honored the dedication, perseverance, and spiritual growth of students who have committed themselves to preparing for a lifetime of ministry.'},
        {t:'p', text:'These graduates leave equipped with a strong biblical foundation, practical ministry training, and an unwavering commitment to preach the uncompromised Gospel. They are being sent into churches, communities, businesses, schools, and nations to fulfill the Great Commission with boldness and the power of the Holy Spirit.'},
        {t:'p', text:'Congratulations to the 2026 graduating class — we celebrate all that the Lord has done in your lives and look forward to seeing how He will use each of you to shake your generation with the Gospel and make an eternal impact around the world.'},
        {t:'strip', imgs:[['p11-2.jpg','Commissioning service'],['p11-3.jpg','Graduating class'],['p11-6.jpg','Deans and honorees'],['p11-1.jpg','Worship at graduation'],['p11-7.jpg','Address to graduates']]},
        {t:'cap', text:'SCENES FROM COMMISSIONING SUNDAY · PG. 11'}
       ]},
      {id:'real', toc:'As Real As It Gets', page:12, kicker:'CONFERENCE RECAP · PAGE 12',
       title:'As Real As It Gets',
       blocks:[
        {t:'photo', src:'p12-1.jpg', alt:'As Real As It Gets conference art', cap:'SPRING MINISTERS’ & LEADERS’ CONFERENCE · PG. 12'},
        {t:'p', text:'The As Real As It Gets Spring Ministers’ & Leaders’ Conference brought together pastors, evangelists, missionaries, church leaders, and ministry teams from around the world for a powerful week of refreshing, impartation, and equipping at The River Church in Tampa, Florida. Every service was marked by passionate worship, uncompromising preaching, and the tangible presence of God.'},
        {t:'p', text:'Throughout the conference, Drs. Rodney and Adonica Howard‑Browne, along with special guest speakers, challenged ministers to remain steadfast in their calling, preach the uncompromised Word of God, and pursue lives of holiness, boldness, and complete dependence on the Holy Spirit. Messages focused on revival, soul winning, leadership, integrity, and the urgency of reaching this generation.'},
        {t:'p', text:'Powerful altar ministry followed every service as ministers received fresh impartation, healing, renewed strength, and divine direction. Many testified of personal breakthrough, restored vision, physical healing, and a renewed passion to fulfill the Great Commission.'},
        {t:'p', text:'The week concluded with a powerful commissioning, sending attendees back into the harvest field empowered by the Holy Spirit — once again a catalyst for revival, inspiring leaders to carry the fire of God wherever He has called them to minister.'},
        {t:'strip', imgs:[['p12-6.jpg','Conference session'],['p12-10.jpg','Altar ministry'],['p12-4.jpg','Worship'],['p12-8.jpg','Ministers receiving prayer'],['p12-2.jpg','Packed sanctuary']]},
        {t:'cap', text:'SCENES FROM THE WEEK · PG. 12'}
       ]},
      {id:'banquet', toc:'R.U. Banquet for the History Books', page:13, kicker:'CAMPUS · PAGE 13',
       title:'An R.U. Banquet for the History Books!',
       blocks:[
        {t:'photo', src:'p13-14.jpg', alt:'Desert Oasis banquet', cap:'THE 28TH ANNUAL BANQUET’S DESERT OASIS THEME · PG. 13'},
        {t:'p', text:'The 28th Annual River University Banquet was truly a night to remember. This year’s Desert Oasis theme provided the perfect setting as students, faculty, and guests gathered to celebrate another incredible year at River University.'},
        {t:'p', text:'The evening was highlighted by the recognition of our Presidents, Drs. Rodney & Adonica Howard‑Browne, our Deans, Drs. Mark & Martha Cabrera, and our outstanding instructors, who were honored for their faithful service and received honorary degrees.'},
        {t:'p', text:'Guests enjoyed an unforgettable evening filled with laughter, fellowship, exceptional cuisine, and outstanding student performances that showcased the remarkable talent, creativity, and excellence found throughout River University. More than just a banquet, the evening celebrated the vision, leadership, and commitment to raising up a generation that will impact the world with the Gospel — certainly one for the history books.'},
        {t:'strip', imgs:[['p13-1.jpg','Presidents honored'],['p13-2.jpg','River University leaders'],['p13-7.jpg','Student performance'],['p13-5.jpg','Banquet guests'],['p13-6.jpg','Desert Oasis stage']]},
        {t:'cap', text:'AN EVENING OF HONOR AND CELEBRATION · PG. 13'}
       ]},
      {id:'witness', toc:'The Power to Be a Witness', page:14, kicker:'FEATURE · PAGES 14–17',
       title:'The Power to Be a Witness',
       byline:'By Drs. Rodney & Adonica Howard‑Browne',
       blocks:[
        {t:'photo', src:'p14-2.jpg', alt:'Worship at sunrise', cap:'FEATURE ART FROM THE PRINT EDITION · PG. 14'},
        {t:'quote', text:'“But ye shall receive power, after that the Holy Ghost is come upon you: and ye shall be witnesses unto me both in Jerusalem, and in all Judaea, and in Samaria, and unto the uttermost part of the earth.”', attr:'— ACTS 1:8 (KJV)'},
        {t:'drop', text:'Jesus never intended for His Church to live powerless. The promise of the Holy Ghost was given so believers would have the power to be His witnesses — not only in their own city, but wherever He sends them.'},
        {t:'p', text:'When you are genuinely born again and filled with the Holy Spirit, you cannot remain silent. The love of God compels you to tell others what Jesus has done, and you have to shout it out! The Holy Spirit gives you a greater awareness of the people around you. He opens your ears to hear the cries of the lost and moves your heart with compassion to reach them.'},
        {t:'p', text:'Throughout the book of Acts, we see men and women led by the Holy Spirit to take the Gospel wherever He directed them. In Acts 16:9–10, Paul received a vision in the night of a man from Macedonia pleading, “Come over into Macedonia, and help us.” God still speaks today, and He is still calling people to carry the Good News to a lost and dying world.'},
        {t:'quote', text:'A missionary is not one who crosses the sea but one who sees the Cross.', attr:''},
        {t:'p', text:'As a young boy of twelve or thirteen years old, I experienced a life‑changing encounter with the Lord. In a dream, I saw Jesus and wept as I saw multitudes of people entering a lost eternity. I asked Jesus who would tell them about Him so they could be saved and make Heaven. He showed me that I would need to tell them, and I promised I would. The call to preach the Gospel is not reserved for a select few. I gave the Lord a wholehearted “yes,” a commitment that has since carried us to 101 nations of the world.'},
        {t:'p', text:'To obey God’s Call and the Great Commission, you must have the Holy Ghost and fire. What happened on the Day of Pentecost in Acts 2 was not a one‑off experience — “While Peter yet spake these words, the Holy Ghost fell on all them which heard the word” (Acts 10:44).'},
        {t:'p', text:'The Holy Spirit is still moving throughout the Earth. When you commit yourself to winning the lost at any cost, supernatural and miraculous things begin to happen. The mission Jesus gave His disciples in Acts 1:8 remains our mission today. It begins at home — sharing the Gospel with family, friends, neighbors, and coworkers — and continues as we minister in our communities and take the Gospel wherever the Lord opens a door. Fire was never meant to be contained. Fire spreads.'},
        {t:'p', text:'God is still calling, anointing, and appointing men and women for His purpose. The question is not whether He is speaking, but whether we are listening. Get hungry. Get thirsty. Get desperate. Press into the presence of God. Today is your day to step into the assignment He has prepared for you.'},
        {t:'box', blocks:[
          {t:'photo', src:'p16-0.jpg', alt:'2026 - The Year of Establishment'},
          {t:'h3', text:'2026 Is the Year of Establishment'},
          {t:'p', text:'According to 1 Peter 5:10, the God of all grace perfects, establishes, strengthens, and settles His people after seasons of endurance. This year is not about beginning something new, but about standing firmly in what God has already spoken, initiated, and accelerated. What was once in motion is now secured. What was forming now functions. Establishment is God locking something in place — bringing stability, strength, and permanence to what He never intended to leave unfinished.'},
          {t:'p', text:'In 2026, God is actively working through five divine pillars — and this is not a year of motion without result. Acceleration moves you forward; establishment makes you immovable.'},
          {t:'log', rows:[
            {title:'1 · Divine Order — everything brought into proper sequence, structure, and authority. Confusion removed; timing corrected; things stop colliding and start sequencing.', meta:'ECCL. 3:1 · COL. 1:17 · PROV. 16:3'},
            {title:'2 · Divine Fulfillment — promises completed and brought to their intended end. Chapters closed, assignments completed; this is a finishing year.', meta:'NUM. 23:19 · JOSH. 21:45 · LUKE 1:45'},
            {title:'3 · Divine Alignment — people, resources, timing, and purpose in exact position. Right relationships lock in; what was forced falls away.', meta:'AMOS 3:3 · PS. 37:23 · EPH. 2:10'},
            {title:'4 · Divine Manifestation — what was hidden, prayed for, and believed made visible and undeniable. Prayers answered openly; testimonies undeniable.', meta:'MARK 4:22 · HAB. 2:3 · ROM. 8:19'},
            {title:'5 · Divine Harvest — reaping without loss, increase without strain. Nothing wasted, nothing lost, nothing stolen.', meta:'GAL. 6:9 · 2 COR. 9:6 · PS. 126:6'}
          ]},
          {t:'dek', text:'What God ordered stays ordered. What God promised is fulfilled. What God aligned remains aligned. What God revealed cannot be hidden again. What God planted is fully harvested. What God has begun — He has now established.'}
        ]}
       ]},
      {id:'mobilized', toc:'A Ministry Mobilized', page:18, kicker:'OUTREACH · PAGES 18–19',
       title:'A Ministry Mobilized: Faith, Horsepower, and Heaven’s Purpose!',
       blocks:[
        {t:'dek', text:'Sometimes the best way to reach hearts is through horsepower.'},
        {t:'photo', src:'p18-2.jpg', alt:'River Car Show custom build', cap:'THE RIVER CAR SHOW ON THE FIELD OF DREAMS · PG. 18'},
        {t:'stats', cells:[['31,262','ATTENDANCE'],['4,114','CARS SHOWN'],['9,884','SOULS · SINCE 3/21']]},
        {t:'p', text:'Our mission has always been about souls and fulfilling God’s divine purpose — nothing more, nothing less, and nothing else. But here at The River, we’ve discovered that sometimes the best way to reach hearts is through horsepower! Since March 2021, we’ve been turning wrenches and winning souls with our River Car Show, a dream that roared to life after Pastor Ron Phillips prophesied, “The day will come when people will come on the property just to see the cars.”'},
        {t:'p', text:'That day came, and it hasn’t slowed down since! To date, we’ve showcased over 4,114 stunning rides under our Pavilion on the Field of Dreams — from classic cruisers to custom builds, muscle cars to modern marvels — and celebrated more than 9,884 salvation decisions along the way. Each show is a family‑friendly time of faith and fun, packed with live music, delicious food, and cash prizes for standout vehicles.'},
        {t:'p', text:'Now we’re revving up for even greater adventures. The Church isn’t meant to stay parked; we’re built to move! This is a search and rescue mission, bringing the power of God into every lane of life: ministry, business, government, sports, and entertainment. Together, we will fulfill our vow to win 100 million souls and fuel $1 billion toward world missions. So grab your keys, shine your chrome, and join the movement that’s changing lives one engine rev at a time!'},
        {t:'strip', imgs:[['p18-1.jpg','Classic rides under the Pavilion'],['p18-4.jpg','Custom classic'],['p18-3.jpg','Trophy presentation'],['p18-0.jpg','Car show crowd']]},
        {t:'link', text:'RIVERCARSHOW.COM · UPCOMING SHOWS & PHOTOS', href:'https://rivercarshow.com/'},
        {t:'h2', text:'Operation Eden: Beyond Organic Produce!'},
        {t:'p', text:'Four words perfectly describe our land production goals: Sow, Grow, Educate, and Duplicate. Our mission is to maximize the growing capabilities of Operation Eden’s 5 acres, and educate and duplicate the results for communities and churches throughout Florida, the United States, and the world. In 2025 we continued hosting our U‑Pick Market, where River Church members picked their own produce — beyond organic from seed to harvest, nothing treated with chemicals, grown with heirloom seeds, organic soil, compost, and filtered water.'},
        {t:'link', text:'OPERATION EDEN · REVIVAL.COM/RIVER/OPERATIONEDEN', href:'https://www.revival.com/river/operationeden'},
        {t:'h2', text:'Kingdom Business Fellowship: Advancing the Kingdom Through Business'},
        {t:'dek', text:'“There is an anointing to get wealth. That anointing is for daily life and for daily service.” — Dr. Rodney Howard‑Browne'},
        {t:'p', text:'God is raising up a new breed of entrepreneurs — men and women who see their business as their ministry and their marketplace as their mission field. Through Kingdom Business Fellowship (K.B.F.), we are cultivating and raising up 300 Kingdom millionaires, a modern‑day Gideon’s army, to fund the end‑time harvest and advance God’s Kingdom across the earth (Deut. 8:17–18).'},
        {t:'p', text:'K.B.F. training combines spiritual revelation and practical application: God’s blueprint for wealth creation, building and managing your business on biblical principles, avoiding the pitfalls of greed and pride, brands and marketing, taxes and financial stewardship. Because money is a wonderful servant but a terrible master, we train you to become a Kingdom builder, not a castle builder — to fund souls, feed nations, and fulfill the Great Commission through the vehicle of business.'},
        {t:'link', text:'JOIN VIRTUALLY OR IN PERSON · 1ST & 3RD TUESDAYS · 6 P.M. (ET)', href:'https://kbftampa.com/'}
       ]},
      {id:'ru', toc:'River University', page:20, kicker:'ADMISSIONS · PAGE 20',
       title:'River University: Raising Up Strong & Godly Leadership',
       blocks:[
        {t:'dek', text:'R.U. ready to write history? The August 2026 intake is quickly approaching.'},
        {t:'p', text:'River University – River Bible Institute (R.U.) is raising up a new breed of revivalists for the 21st century. R.U. is a place where the Word of God and the Holy Spirit come together to produce life, birth ministries, and launch graduates into their respective areas of ministry and government. As you will discover, River University is not a traditional Bible school — it is a Holy Ghost training center, birthed specifically for those whose strongest desire is to know Christ and to make Him known.'},
        {t:'h2', text:'River School of Government'},
        {t:'p', text:'Founded in 2012, R.S.G. exists to raise up godly individuals with personal and public integrity to take up key positions in government. R.S.G. is non‑partisan — our goal is not to produce career politicians, but people who will govern according to solid, godly principles and faithfully defend the individual rights and freedoms guaranteed by God’s Natural Law and God’s Word. Full scholarships are available to all R.S.G. students. They will be the definers of policy and defenders of liberty — we have come to “turn the world upside down” (Acts 17:6)!'},
        {t:'h2', text:'River Culinary Institute'},
        {t:'p', text:'In service of the King: a specialty program laying a solid foundation in culinary and hospitality excellence through biblical perspectives and rigorous training. We are raising up a new breed of culinary and hospitality industry experts!'},
        {t:'h2', text:'River School of Media'},
        {t:'p', text:'A hands‑on, immersive training ground for the next generation of digital evangelists — film production, live broadcast, lighting, audio, photography, editing, storytelling, and emerging technologies like artificial intelligence (AI) — all while staying rooted in the power and presence of God.'},
        {t:'strip', imgs:[['p20-1.jpg','R.U. worship'],['p20-2.jpg','Culinary training'],['p20-4.jpg','Media production'],['p20-5.jpg','Commissioning night']]},
        {t:'box', blocks:[
          {t:'p', text:'Start your journey today! Scholarships are available — ask about all of R.U.’s programs of study and apply now for the August 2026 intake.'},
          {t:'link', text:'APPLY: REVIVAL.COM', href:'https://www.riveruniversity.org/admissions'}
        ]}
       ]},
      {id:'vow', toc:'Vow of Prosperity', page:21, kicker:'DEVOTIONAL · PAGE 21',
       title:'Vow of Prosperity',
       blocks:[
        {t:'photo', src:'p21-0.jpg', alt:'Open Bible'},
        {t:'box', blocks:[
          {t:'cap', text:'VOW OF PROSPERITY AND CONFESSION OF FAITH'},
          {t:'p', text:'Dear Lord: I thank You for Your promises of material abundance for my life. You do not will poverty and need, any more than You will sin and sickness. I am thankful to know Your great salvation (Hebrews 2:3) delivers me not only from my sins, but from their consequences — from all the works of the devil (1 John 3:8) that have been sent to steal, kill, and destroy my heritage (John 10:10).'},
          {t:'p', text:'When You created material abundance in this earth, You demonstrated that You want Your children to enjoy it and to utilize it. You placed rich treasures here (Genesis 2:9–14) for the prosperity, facility and blessing of Your children who carry out Your will among people.'},
          {t:'p', text:'Thank You, Lord. Your Word says I shall not lack any good thing (Psalm 34:10). You shall supply all of my need (Philippians 4:19). You wish, above all things, that I prosper and be in health, even as my soul prospers (3 John 2). You have pleasure in the prosperity of Your servants (Psalm 35:27), and You have promised to make me plenteous in goods (Deuteronomy 28:11). I believe that You have commanded Your blessing upon me in all that I set my hand to (Deuteronomy 28:8), and that Christ redeemed me from the curse (Galatians 3:13) of poverty and evil, of lack and destitution.'},
          {t:'p', text:'I will, from this day, honor You with my substance and with the firstfruits (not leftovers) of all my increase: so shall my barns be filled with plenty (Proverbs 3:9–10). The earth is the Lord’s and the fullness thereof (1 Corinthians 10:26); riches and wealth are the gift of God (Ecclesiastes 5:19). So long as I do not love money (1 Timothy 6:10) or seek to store it up or trust in riches (Mark 10:24), You will make my way prosperous, and I shall have good success (Joshua 1:8).'},
          {t:'p', text:'I will bring my firstfruits — my first and my best — my tithes and my offerings to You for Your work, as You commanded (Malachi 3:10), and I shall prove Your Word by acting upon it. I believe You will open Heaven’s windows and pour me out blessings and harvests of much more than I bring to You. I understand that loving is giving, and giving is planting, and whatever I sow, I shall also reap — more (Galatians 6:7).'},
          {t:'p', text:'I will begin planting. And since You are the God of miracles, I know that even if it requires a material miracle, like multiplying the boy’s lunch to feed a multitude, You will do it to guarantee my harvest. Your Word cannot return to You void (Isaiah 55:11) and the Scriptures cannot be broken (John 10:35). Although there is suffering and poverty around me, this is Satan’s work — not Yours.'},

      el('nwsResume').addEventListener('click', function(){ nwsSheet(false); });
      applyNewsTheme();
      applyNewsFont();
      applyNewsSize();
      nwsPaint();
    }
    function applyNewsTheme(){
      var t=nwsTheme(), root=el('shellNews');
      root.classList.toggle('paper', t==='paper');
      root.classList.toggle('ink', t==='ink');
      el('nwsLbl').textContent = t==='paper' ? 'FIRE CONF · NEWSPAPER' : 'NEWSPAPER';
      var sht=el('nwsShT'); if(sht) sht.textContent = t==='paper' ? 'Inside this issue' : 'Sections';
      var mt=document.querySelector('meta[name=theme-color]'); if(mt) mt.setAttribute('content', t==='paper'?'#f6f1e7':'#141415');
      [].slice.call(root.querySelectorAll('[data-nwstheme]')).forEach(function(c){ c.classList.toggle('on', c.getAttribute('data-nwstheme')===t); });
    }
    function nwsKeepPlace(apply){
      var sc=el('nwsScroll'), top=sc.scrollTop, sec=null;
      for(var i=newsSecEls.length-1;i>=0;i--){ if(newsSecEls[i].offsetTop<=top){ sec=newsSecEls[i]; break; } }
      var frac=sec ? (top-sec.offsetTop)/(sec.offsetHeight||1) : 0;
      apply();
      setTimeout(function(){
        sc.scrollTop = sec ? Math.round(sec.offsetTop + frac*(sec.offsetHeight||1)) : top;
        nwsSpy();
      }, 30);
    }
    function setNewsTheme(t){
      try{ localStorage.setItem('fc_news_theme', t); }catch(e){}
      var root=el('shellNews');
      root.classList.add('fading');
      setTimeout(function(){ nwsKeepPlace(applyNewsTheme); root.classList.remove('fading'); }, 160);
      trackEvent('news_theme',{theme:t});
    }
    var newsMax=0;
    try{ newsMax=parseInt(localStorage.getItem('fc_news_max')||'0',10)||0; }catch(e){}
    function nwsPaint(){
      var I=window.COR_ISSUE, s=I.sections[newsSec], pct=Math.round(s.page/I.pages*100);
      if(newsSec>newsMax){ newsMax=newsSec; try{ localStorage.setItem('fc_news_max',String(newsMax)); }catch(e){} }
      el('nwsPill').innerHTML='<span style="font-size:14px;line-height:1;">☰</span><span>Inside this issue</span><span class="pg">PG '+s.page+' · '+pct+'%</span>';
      var rows=el('nwsToc')?el('nwsToc').querySelectorAll('.nwsTocRow'):[];
      [].slice.call(rows).forEach(function(r,i){ r.classList.toggle('on', i===newsSec); });
      var prog=el('nwsProg'); if(prog) prog.style.width=pct+'%';
      var now=el('nwsNow'); if(now) now.textContent=('0'+(newsSec+1)).slice(-2)+' · '+s.toc.toUpperCase();
      var ticks=el('nwsTicks')?el('nwsTicks').children:[];
      [].slice.call(ticks).forEach(function(t,i){
        t.classList.toggle('cur', i===newsSec);
        t.classList.toggle('read', i!==newsSec && i<=newsMax);
      });
      var rt=el('nwsResT'); if(rt){ rt.textContent=s.title; el('nwsResM').textContent='Section '+('0'+(newsSec+1)).slice(-2)+' · Pg '+s.page+' · '+pct+'% read'; }
    }
    function nwsSpy(){
      newsRaf=0;
      if(nwsAnim) return; /* keep the committed target section during an animated jump */
      var sc=el('nwsScroll'), top=sc.scrollTop, cur=0;
      for(var i=0;i<newsSecEls.length;i++){ if(newsSecEls[i].offsetTop-60<=top) cur=i; else break; }
      if(cur!==newsSec){ newsSec=cur; nwsPaint(); }
    }
    var nwsAnim=0;
    function nwsScrollTo(target){
      /* timer-driven eased scroll: element.scrollTo({behavior:'smooth'}) silently
         no-ops on older iOS Safari, and rAF can be suspended in embedded webviews */
      var sc=el('nwsScroll'), from=sc.scrollTop, dist=target-from, t0=performance.now(), DUR=460;
      clearTimeout(nwsAnim);
      function ease(x){ return x<0.5 ? 4*x*x*x : 1-Math.pow(-2*x+2,3)/2; }
      function step(){
        var p=Math.min(1,(performance.now()-t0)/DUR);
        sc.scrollTop=from+dist*ease(p);
        if(p<1) nwsAnim=setTimeout(step,16);
        else { nwsAnim=0; nwsSpy(); }
      }
      nwsAnim=setTimeout(step,0);
    }
    function nwsJump(i){
      newsSec=i; nwsPaint(); nwsSheet(false);
      var sec=newsSecEls[i]; if(sec) nwsScrollTo(Math.max(0,sec.offsetTop-6));
      trackEvent('news_jump',{section:window.COR_ISSUE.sections[i].id});
    }
    function nwsSheet(open){ el('shellNews').classList.toggle('sheet', !!open); if(open) el('shellNews').classList.remove('set'); }
    function nwsSet(open){ el('shellNews').classList.toggle('set', !!open); if(open) el('shellNews').classList.remove('sheet'); }
    var NWS_SIZES=[0.875,0.9375,1,1.125,1.25];
    function nwsSize(){ var i=2; try{ i=parseInt(localStorage.getItem('fc_news_size'),10); }catch(e){}
      return (i>=0 && i<NWS_SIZES.length) ? i : 2; }
    function applyNewsSize(){
      var i=nwsSize();
      el('shellNews').style.setProperty('--fz', NWS_SIZES[i]);
      el('nwsSzDn').disabled = i<=0;
      el('nwsSzUp').disabled = i>=NWS_SIZES.length-1;
    }
    function stepNewsSize(d){
      var i=Math.max(0, Math.min(NWS_SIZES.length-1, nwsSize()+d));
      try{ localStorage.setItem('fc_news_size', String(i)); }catch(e){}
      nwsKeepPlace(applyNewsSize);
      trackEvent('news_size',{step:i});
    }
    var NWS_FONTS=['orig','ny','charter','palatino','times','sf'];
    function nwsFont(){ try{ var f=localStorage.getItem('fc_news_font'); return NWS_FONTS.indexOf(f)>=0?f:'orig'; }catch(e){ return 'orig'; } }
    function applyNewsFont(){
      var f=nwsFont(), root=el('shellNews');
      NWS_FONTS.forEach(function(x){ root.classList.toggle('f-'+x, x===f && x!=='orig'); });
      [].slice.call(document.querySelectorAll('[data-nwsfont]')).forEach(function(r){ r.classList.toggle('on', r.getAttribute('data-nwsfont')===f); });
    }
    function setNewsFont(f){
      try{ localStorage.setItem('fc_news_font', f); }catch(e){}
      nwsKeepPlace(applyNewsFont);
      trackEvent('news_font',{font:f});
    }
    function savePos(){ try{ localStorage.setItem('fc_news_pos', String(el('nwsScroll').scrollTop)); }catch(e){} }
    function leaveNews(){
      savePos();
      if(history.length>1 && document.referrer.indexOf(location.origin)===0) history.back();
      else location.href='/';
    }
    function initNews(){
      buildNews();
      try{
        localStorage.setItem('fc_news_opened','1');
        var pos=parseInt(localStorage.getItem('fc_news_pos')||'0',10);
        if(pos>0) el('nwsScroll').scrollTop=pos;
      }catch(e){}
      nwsSpy();
      /* poll fallback: some webviews suspend scroll events entirely */
      if(!newsPoll) newsPoll=setInterval(function(){
        var t=el('nwsScroll').scrollTop;
        if(t!==newsLastTop){ newsLastTop=t; nwsSpy(); }
      }, 400);
      var src=(location.search.match(/[?&]src=([a-z]+)/)||[])[1]||'direct';
      trackEvent('news_open',{src:src});
      window.addEventListener('pagehide', savePos);
      document.addEventListener('visibilitychange', function(){ if(document.visibilityState==='hidden') savePos(); });
      document.addEventListener('keydown', function(e){
        if(e.key==='Escape'||e.key==='Esc'){
          var root=el('shellNews');
          if(el('nwsLight').classList.contains('open')){ el('nwsLight').classList.remove('open'); return; }
          if(root.classList.contains('set')) nwsSet(false);
          else if(root.classList.contains('sheet')) nwsSheet(false);
          else leaveNews();
        }
      });
      el('nwsBack').addEventListener('click', leaveNews);
      el('nwsFlow').addEventListener('click', function(e){
        var a=e.target.closest ? e.target.closest('a') : null;
        if(a && a.getAttribute('href')) trackEvent('news_link',{href:a.getAttribute('href')});
      });
      /* ---- media viewer: gallery slider + pinch zoom + Instagram context ---- */
      var IG_BY_SECTION={ 'tour':'celebrateamericadc', 'dc':'celebrateamericadc' };
      var IG_DEFAULT='rmi.hq';
      var BOOK_LINKS={
        '12 Qualifications and Responsibilities of Leadership':'https://store.revival.com/products/12-qualifications-and-responsibilities-of-leadership',
        'This Is Your Jubilee':'https://store.revival.com/products/the-acceptable-year-of-the-lord-jubilee',
        'Prayer and Fasting':'https://store.revival.com/products/the-marks-of-a-good-pastor-copy',
        'The Gift of Faith':'https://store.revival.com/products/the-gift-of-faith',
        'The Five Pillars of Establishment':'https://store.revival.com/products/the-five-pillars-of-establishment',
        'The Marks of a Good Pastor':'https://store.revival.com/products/the-marks-of-a-good-pastor'
      };
      var gal=[], galIdx=0, gz={s:1,tx:0,ty:0}, galSec='';
      function galApply(){ el('nwsLightImg').style.transform='translate('+gz.tx+'px,'+gz.ty+'px) scale('+gz.s+')'; }
      function galReset(){ gz={s:1,tx:0,ty:0}; galApply(); }
      function galShow(i){
        galIdx=Math.max(0,Math.min(gal.length-1,i));
        var it=gal[galIdx];
        el('nwsLightImg').src=it.src; el('nwsLightImg').alt=it.alt;
        el('nwsLightCap').textContent=it.cap||it.alt||'';
        el('nwsLightCnt').textContent=gal.length>1 ? (galIdx+1)+' / '+gal.length : '';
        el('nwsLightPrev').disabled=galIdx<=0;
        el('nwsLightNext').disabled=galIdx>=gal.length-1;
        el('nwsLightPrev').style.display=el('nwsLightNext').style.display=(gal.length>1?'flex':'none');
        if(galSec==='books'||galSec==='everywhere'){
          el('nwsLightIg').href=BOOK_LINKS[it.alt]||'https://store.revival.com/collections/books';
          el('nwsLightIgT').textContent=BOOK_LINKS[it.alt] ? 'BUY THIS BOOK · REVIVAL STORE' : 'BROWSE BOOKS · REVIVAL STORE';
        } else {
          var handle=IG_BY_SECTION[galSec]||IG_DEFAULT;
          el('nwsLightIg').href='https://instagram.com/'+handle;
          el('nwsLightIgT').textContent='MORE ON INSTAGRAM · @'+handle.toUpperCase();
        }
        el('nwsLightIg').style.display='inline-flex';
        galReset();
      }
      el('nwsFlow').addEventListener('click', function(e){
        var im=e.target;
        if(!im || im.tagName!=='IMG') return;
        if(im.closest && im.closest('a')) return; /* linked images navigate, no lightbox */
        var secEl=im.closest ? im.closest('[data-nws]') : null;
        galSec=secEl ? (window.COR_ISSUE.sections[parseInt(secEl.getAttribute('data-nws'),10)]||{}).id : '';
        var strip=im.closest ? im.closest('.nwsStrip') : null;
        if(strip){
          gal=[].slice.call(strip.querySelectorAll('img')).map(function(x){ return {src:x.src,alt:x.alt||'',cap:x.alt||''}; });
          galShow(gal.map(function(g){return g.src;}).indexOf(im.src));
        } else {
          var wrap=im.closest ? im.closest('.nwsPhR') : null;
          var capEl=wrap ? wrap.querySelector('.nwsCap') : (im.nextElementSibling && im.nextElementSibling.className==='nwsCap' ? im.nextElementSibling : null);
          gal=[{src:im.src,alt:im.alt||'',cap:(capEl?capEl.textContent:im.alt)||''}];
          galShow(0);
        }
        el('nwsLight').classList.add('open');
        trackEvent('news_image_view',{section:galSec, series:gal.length});
      });
      function closeLight(){ el('nwsLight').classList.remove('open'); el('nwsLightImg').src=''; gal=[]; }
      el('nwsLightX').addEventListener('click', closeLight);
      el('nwsLight').addEventListener('click', function(e){ if(e.target===el('nwsLight')||e.target===el('nwsLightStage')) closeLight(); });
      el('nwsLightPrev').addEventListener('click', function(){ galShow(galIdx-1); });
      el('nwsLightNext').addEventListener('click', function(){ galShow(galIdx+1); });
      el('nwsLightIg').addEventListener('click', function(){ trackEvent('news_ig_tap',{section:galSec}); });
      /* touch: swipe between series images (at 1x), pinch to zoom, pan when zoomed, double-tap toggles */
      (function(){
        var stage=el('nwsLightStage'), img=el('nwsLightImg');
        var pts=new Map(), swipeX=null, lastTap=0;
        stage.addEventListener('pointerdown', function(e){
          stage.setPointerCapture(e.pointerId);
          pts.set(e.pointerId,{x:e.clientX,y:e.clientY});
          if(pts.size===1){
            swipeX=e.clientX;
            var now=performance.now();
            if(now-lastTap<300){ /* double-tap zoom toggle */
              if(gz.s>1.05) galReset();
              else{ var r=stage.getBoundingClientRect(); var cx=e.clientX-r.left, cy=e.clientY-r.top;
                gz.s=2.2; gz.tx=cx-(cx-gz.tx)*2.2; gz.ty=cy-(cy-gz.ty)*2.2; galApply(); }
              lastTap=0;
            } else lastTap=now;
          }
        });
        stage.addEventListener('pointermove', function(e){
          if(!pts.has(e.pointerId)) return;
          var prev=pts.get(e.pointerId), cur={x:e.clientX,y:e.clientY};
          if(pts.size===2){
            var ids=[].slice.call(pts.keys()), o=pts.get(ids[0]===e.pointerId?ids[1]:ids[0]);
            var d0=Math.hypot(prev.x-o.x,prev.y-o.y), d1=Math.hypot(cur.x-o.x,cur.y-o.y);
            if(d0>0){
              var r=stage.getBoundingClientRect(), cx=(cur.x+o.x)/2-r.left, cy=(cur.y+o.y)/2-r.top;
              var f=d1/d0, ns=Math.max(1,Math.min(5,gz.s*f)); f=ns/gz.s;
              gz.tx=cx-(cx-gz.tx)*f; gz.ty=cy-(cy-gz.ty)*f; gz.s=ns;
              if(gz.s<=1.001){ gz.tx=0; gz.ty=0; }
              galApply();
            }
          } else if(pts.size===1 && gz.s>1.05){
            gz.tx+=cur.x-prev.x; gz.ty+=cur.y-prev.y; galApply();
          }
          pts.set(e.pointerId,cur);
        });
        function up(e){
          if(pts.has(e.pointerId) && pts.size===1 && gz.s<=1.05 && swipeX!==null && gal.length>1){
            var dx=e.clientX-swipeX;
            if(dx<-48) galShow(galIdx+1);
            else if(dx>48) galShow(galIdx-1);
          }
          pts.delete(e.pointerId); if(!pts.size) swipeX=null;
        }
        ['pointerup','pointercancel','lostpointercapture'].forEach(function(ev){ stage.addEventListener(ev,up); });
        /* arrow keys */
        document.addEventListener('keydown', function(e){
          if(!el('nwsLight').classList.contains('open')) return;
          if(e.key==='ArrowRight') galShow(galIdx+1);
          else if(e.key==='ArrowLeft') galShow(galIdx-1);
        });
      })();
      el('nwsAa').addEventListener('click', function(){ nwsSet(true); trackEvent('news_settings_open'); });
      el('nwsSetX').addEventListener('click', function(){ nwsSet(false); });
      el('nwsShare').addEventListener('click', function(){
        var url='https://map.fire.revival.com/newspaper.html';
        var data={title:'Chronicles of Revival · July 2026', text:'Read the July 2026 issue of Chronicles of Revival', url:url};
        trackEvent('news_share');
        if(navigator.share){ navigator.share(data).catch(function(){}); }
        else if(navigator.clipboard){ navigator.clipboard.writeText(url); var b=el('nwsShare'); var t=b.innerHTML; b.textContent='Link copied!'; setTimeout(function(){ b.innerHTML=t; },1400); }
      });
      el('nwsLbl').addEventListener('click', function(){ nwsScrollTo(0); });
      el('nwsSzDn').addEventListener('click', function(){ stepNewsSize(-1); });
      el('nwsSzUp').addEventListener('click', function(){ stepNewsSize(1); });
      el('nwsPill').addEventListener('click', function(){ nwsSheet(true); });
      el('nwsScrim').addEventListener('click', function(){ nwsSheet(false); nwsSet(false); });
      [].slice.call(el('nwsSet').querySelectorAll('[data-nwstheme]')).forEach(function(c){
        c.addEventListener('click', function(){ setNewsTheme(c.getAttribute('data-nwstheme')); });
      });
      [].slice.call(el('nwsFonts').querySelectorAll('[data-nwsfont]')).forEach(function(r){
        r.addEventListener('click', function(){ setNewsFont(r.getAttribute('data-nwsfont')); });
      });
    }

    /* silent auto-update: reading position persists via savePos, so a reload is invisible */
    if('serviceWorker' in navigator){
      (function(){
        var pending=false, hadCtrl=!!navigator.serviceWorker.controller, lastTouch=Date.now();
        var myTag=null;
        function readTag(res){ return res.headers.get('etag')||res.headers.get('last-modified')||null; }
        function check(){
          /* the page's own ETag changes on every deploy — SW bytes usually don't */
          fetch('/newspaper.html', {method:'HEAD', cache:'no-store'}).then(function(res){
            var t=readTag(res); if(!t) return;
            if(myTag===null){ myTag=t; return; }
            if(t!==myTag){ pending=true; }
          }).catch(function(){});
          navigator.serviceWorker.getRegistration().then(function(r){ if(r) r.update().catch(function(){}); }).catch(function(){});
        }
        check(); /* baseline tag immediately */
        navigator.serviceWorker.addEventListener('controllerchange', function(){
          if(!hadCtrl){ hadCtrl=true; return; }
          pending=true;
        });
        function safeReload(){
          if(!pending) return; pending=false;
          savePos();
          trackEvent('auto_update_reload');
          location.reload();
        }
        document.addEventListener('visibilitychange', function(){
          if(document.visibilityState==='visible'){ check(); setTimeout(safeReload, 400); }
        });
        ['touchstart','scroll','pointerdown','keydown'].forEach(function(ev){
          document.addEventListener(ev, function(){ lastTouch=Date.now(); }, {passive:true});
        });
        setInterval(function(){ if(pending && Date.now()-lastTouch>60000) safeReload(); }, 15000);
        setInterval(check, 600000);
        setTimeout(check, 30000);
      })();
    }
    initNews();

})();
</script>
